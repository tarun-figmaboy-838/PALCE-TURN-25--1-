        /* =========================================================
           DISPENSER DRAIN (capacity-fill bug fix)
           The dispenser plays the animated ASSETS/orange_jar_juice_decreasing.svg
           so the juice level visibly drops while a container fills. The fix for
           the original bug is in the *timing*: the drain SVG used to be frozen
           early (JAR_STOP_MS = 2100ms) while the fill + nozzle stream ran to
           FILL_MS — so the jar stopped draining seconds before the pour did.

           Now the drain SVG runs for the WHOLE fill and is frozen (swapped to
           the paused pose) at the same moment the stream stops, via
           freezeDispenserDrain(). Because the SVG loops every 6s and the paused
           pose matches a mid-drain frame, freezing at the end would show a small
           level "snap"; a quick crossfade on the swap hides it.

           A CSS #jar-stop-mask reset is still cleared on every full-jar reset so
           no stale overlay lingers from older builds. */
        let dispenserFreezeTimer = null;

        function clearDispenserDrain() {
            if (dispenserFreezeTimer) { clearTimeout(dispenserFreezeTimer); dispenserFreezeTimer = null; }
            jarStopMask.classList.remove('active');
            jarStopMask.style.transition = 'none';
            jarStopMask.style.height = '0%';
            jarStopMask.style.opacity = '0';
            juice.style.transition = '';
            juice.style.opacity = '1';
        }
        function setDispenserFull() {
            clearDispenserDrain();
            juice.src = JAR_FULL_SRC;
        }
        // Start the looping drain animation (restart its SMIL via cache-bust).
        // The loop is 6s; fills are shorter, so no loop is ever visible before
        // freezeDispenserDrain() locks it.
        function startDispenserDrain() {
            clearDispenserDrain();
            juice.src = JAR_DRAIN_SRC + '?t=' + Date.now();
        }
        // Freeze the drain at the current moment by crossfading to the paused
        // pose. The crossfade softens the small level snap (looping SVG → paused
        // frame). Call this exactly when the fill + stream finish.
        function freezeDispenserDrain() {
            juice.style.transition = 'opacity 200ms ease';
            juice.style.opacity = '0.45';
            dispenserFreezeTimer = setTimeout(() => {
                juice.src = JAR_PAUSED_SRC + '?t=' + Date.now();
                requestAnimationFrame(() => { juice.style.opacity = '1'; });
                dispenserFreezeTimer = setTimeout(() => { juice.style.transition = ''; }, 220);
            }, 150);
        }

        // ---------- Typewriter + guide visibility ----------
        let typeTimer = null;

        function setDialogue(text, onDone) {
            clearInterval(typeTimer);

            dialogueText.innerHTML = '';
            showStageGuide();

            // Soft pop on the whole bubble text each time a new line begins.
            dialogueText.classList.remove('dialogue-pop');
            void dialogueText.offsetWidth;            // restart the keyframe
            dialogueText.classList.add('dialogue-pop');

            // Break the line into ordered units: real characters, spaces, and
            // <br>s. Each character is appended as its own bouncing span so it
            // springs in individually (gamified), while spaces/breaks lay out
            // normally. We append nodes (not re-set innerHTML) so only the new
            // letter animates, never the ones already on screen.
            const units = [];
            text.split(/(<br>)/g).forEach(tok => {
                if (tok === '<br>') { units.push({ br: true }); return; }
                for (const ch of tok) units.push({ ch });
            });

            let index = 0;

            // Neutral, unhurried cadence for early readers — lively but calm.
            const TYPE_SPEED = TYPE_SPEED_MS;

            typeTimer = setInterval(() => {
                if (index >= units.length) {
                    clearInterval(typeTimer);
                    typeTimer = null;
                    if (onDone) onDone();
                    return;
                }

                const u = units[index++];
                if (u.br) {
                    dialogueText.appendChild(document.createElement('br'));
                } else if (u.ch === ' ') {
                    dialogueText.appendChild(document.createTextNode(' '));
                } else {
                    const span = document.createElement('span');
                    span.className = 'char-pop';
                    span.textContent = u.ch;
                    dialogueText.appendChild(span);
                }
            }, TYPE_SPEED);
        }

        function showStageGuide() {
            genie.classList.remove('guide-hidden');
            dialogue.classList.remove('guide-hidden');
            dialogueText.classList.remove('guide-hidden');

           they never collide) and lean him toward the container being talked
           about. Positions are percentages, so the pose stays responsive. */
        // Named explanation poses (Gogo + speech bubble + text), so the guide
        // never overlaps the jar proof area. Percentages → stays responsive.
        const GUIDE_POSES = {
            wideLevelExplain: {
                // Gogo sits BELOW the speech bubble (bubble top 3.2%, Gogo top
                // ~21%) and slightly left, so the bubble + text (higher z-index)
                // are never covered and Gogo isn't hidden behind the bubble.
                genieLeft: '49%', genieTop: '21%',

        // jars and below the bubble; we do NOT auto-nudge here — the genie PNG's
        // bounding box includes lots of transparent padding, so box-overlap

        function applyGuidePose(name) {

        // Guard: if Gogo's box overlaps either jar, lift him up (and nudge
        // right) until the jar proof area is clear. Returns a small report.
        function validateGuideClearance() {
            const overlaps = (a, b) =>
                !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
            const stageH = stage.getBoundingClientRect().height || 1;
            const stageW = stage.getBoundingClientRect().width  || 1;
            let guard = 0, hitTall = false, hitWide = false;
            do {
                const g = genie.getBoundingClientRect();
                const t = tallWrap.getBoundingClientRect();
                const w = wideWrap.getBoundingClientRect();
                hitTall = overlaps(g, t);
                hitWide = overlaps(g, w);
                if (hitTall || hitWide) {
                    const curTop  = parseFloat(genie.style.top)  || (100 * genie.offsetTop  / stageH);
                    const curLeft = parseFloat(genie.style.left) || (100 * genie.offsetLeft / stageW);
                    genie.style.top  = Math.max(2, curTop - 4) + '%';   // lift up
                    genie.style.left = Math.min(70, curLeft + 1) + '%'; // ease right
                }
                guard++;
            } while ((hitTall || hitWide) && guard < 12);
            const report = { hitTall, hitWide, adjustments: guard - 1, clear: !hitTall && !hitWide };
            try { console.table(report); } catch (e) {}
            return report;
        }

            handHint.style.top  = (r.top  - sr.top  + r.height * 0.98) + 'px';

        // ---------- Step 1: move tall wrapper under tap ----------
        // Magical glide: a faint sparkle trail that follows a jar while it
        // travels under the nozzle, plus a soft warm glow that fades out as it
        // settles, ending with a gentle magic ring. createSparkles reads the
        // element's live position each tick, so the sparkles naturally trail
        // along the motion path. Transform is left untouched (pure translate
        // elsewhere) so this never fights the fill/return/success animations.
        function emitGlideMagic(wrapEl, durationMs) {
            const glow = 'drop-shadow(0 0 10px rgba(255,210,90,0.85)) drop-shadow(0 0 20px rgba(255,160,30,0.5))';
            wrapEl.style.transition = (wrapEl.style.transition ? wrapEl.style.transition + ', ' : '') + `filter ${durationMs}ms ease-out`;
            wrapEl.style.filter = glow;
            createSparkles(wrapEl, 5);

            const t0 = performance.now();
            const timer = setInterval(() => {
                if (performance.now() - t0 >= durationMs - 60) {
                    clearInterval(timer);
                    createSparkles(wrapEl, 6);       // settle sparkle (no ring)
                    wrapEl.style.filter = '';        // fade the glow back out
                    return;
                }
                createSparkles(wrapEl, 3);
            }, 120);
        }

        // Per-container anchors for placing a jar under the dispenser tap.
        //   mouthX/mouthY : where the jar's "mouth" is, as a fraction of its box
        //   tapYOffset    : how far BELOW the tap the mouth sits (fraction of the
        //                   jar height). Small = jar stays high under the spout
        //                   and grounded; large = jar sinks (used to float the
        //                   short wide jar below the counter — now reduced).
        const CONTAINER_ANCHORS = {
            tall: { mouthX: 0.50, mouthY: 0.02, tapYOffset: 0.55 },
            wide: { mouthX: 0.50, mouthY: 0.08, tapYOffset: 0.12 }
        };

        // Shared "magically guided" glide of a jar under the dispenser tap.
        // Anchor-based placement keeps the jar grounded (no mid-air float), and
        // the overshoot easing reads as a gentle lift + soft settle bounce while
        // emitGlideMagic trails sparkles + a glow and rings on arrival.
        function moveContainerToTap(wrapEl, type) {
            return new Promise(resolve => {
                const a   = CONTAINER_ANCHORS[type] || CONTAINER_ANCHORS.wide;
                const wr  = wrapEl.getBoundingClientRect();
                const tap = getTapPoint();

                const dx = tap.x - (wr.left + wr.width  * a.mouthX);
                const dy = (tap.y + wr.height * a.tapYOffset) - (wr.top + wr.height * a.mouthY);

                const target = `translate(${dx}px, ${dy}px)`;
                // Store the PURE translate so the success bounce / return can
                // compose a scale on top without fighting it.
                if (type === 'tall') fxRefs.wrapTargetTransform = target;
                else                 wideTargetTransform = target;

                // Overshoot easing → natural lift + settle, not a robotic slide.
                wrapEl.style.transition = `transform ${MOVE_MS}ms cubic-bezier(.22, 1.25, .36, 1)`;
                wrapEl.style.zIndex = '8';
                requestAnimationFrame(() => { wrapEl.style.transform = target; });

                emitGlideMagic(wrapEl, MOVE_MS);   // sparkle trail + glow + settle ring
                setTimeout(resolve, MOVE_MS + 20);
            });
        }

        function moveTallToTap() { return moveContainerToTap(tallWrap, 'tall'); }

        // ---------- Step 2: pour stream from tap to wrapper mouth ----------
        function startPour() {
            playSound('pour');

            const tap = getTapPoint();
            const wr  = tallWrapRect();

            const fromV = tap;

            // Stream ends near the lower inside area of the tall container
            const toV = {
                x: wr.left + wr.width * 0.50,
                y: wr.top  + wr.height * 0.82
            };

            const from = toStage(fromV.x, fromV.y);
            const to   = toStage(toV.x,   toV.y);

            const streamW = Math.max(10, Math.round(stage.clientWidth * 0.007));
            const fullH   = Math.max(80, to.y - from.y);

            const stream = document.createElement('div');
            stream.className = 'fx-pour-stream';
            stream.style.left   = (from.x - streamW / 2) + 'px';
            stream.style.top    = from.y + 'px';
            stream.style.width  = streamW + 'px';
            stream.style.height = '0px';
            stream.style.transition = 'height 520ms ease-in-out';
            stage.appendChild(stream);
            fxRefs.pourStream = stream;

            requestAnimationFrame(() => {
                stream.style.height = fullH + 'px';
            });
        }

        // ---------- Step 3: liquid fills (and bubbles + genie bounce in parallel) ----------
        // The dispenser drains via the CSS mask for the full FILL_MS while the
        // tall container fills — drain, stream and fill all stop together.
        function fillTall() {
            return new Promise(resolve => {
                tall.src = JUICE_FILL_SRC + '?t=' + Date.now();

                // Dispenser plays the animated drain SVG for the WHOLE fill; it
                // is frozen in successEffect() exactly when the tall container is
                // full and the stream stops — so drain + stream end together.
                startDispenserDrain();

                createBubbles(FILL_MS);
                genieHappyBounce(FILL_MS - 100);

                setTimeout(resolve, FILL_MS);
            });
        }

        // ---------- Step 4: bubbles inside the liquid (rise while filling) ----------
        function createBubbles(durationMs) {
            const t0 = performance.now();

            function spawn() {
                // Use the wrapper's bounds (visible glass) with interior insets
                // so bubbles emerge from the rising surface inside the SVG.
                const wr = tallWrap.getBoundingClientRect();
                const ix = wr.left + wr.width  * 0.18;
                const iw = wr.width  * 0.64;
                const iy = wr.top  + wr.height * 0.10;
                const ih = wr.height * 0.82;
                if (ih < 8) return;

                const elapsed  = performance.now() - t0;
                const progress = Math.min(1, elapsed / durationMs);
                const surfaceY = iy + ih * (1 - progress * 0.88);

                const size = 4 + Math.random() * 7;
                const xV   = ix + 3 + Math.random() * Math.max(1, iw - 6);
                const yV   = surfaceY + Math.random() * Math.min(14, ih * 0.18);
                const p    = toStage(xV, yV);

                const b = document.createElement('div');
                b.className = 'fx-bubble';
                b.style.left   = (p.x - size / 2) + 'px';
                b.style.top    = (p.y - size / 2) + 'px';
                b.style.width  = size + 'px';
                b.style.height = size + 'px';
                b.style.opacity = '0.95';
                b.style.transition = 'transform 1100ms ease-out, opacity 1100ms ease-in';
                stage.appendChild(b);

                const rise  = -(ih * (0.30 + Math.random() * 0.22));
                const drift = (Math.random() - 0.5) * 10;

                requestAnimationFrame(() => {
                    b.style.transform = `translate(${drift}px, ${rise}px) scale(${0.6 + Math.random() * 0.4})`;
                    b.style.opacity   = '0';
                });
                setTimeout(() => b.remove(), 1200);
            }

            fxRefs.bubbleTimer = setInterval(() => {
                if (performance.now() - t0 > durationMs) {
                    clearInterval(fxRefs.bubbleTimer);
                    fxRefs.bubbleTimer = null;
                    return;
                }
                spawn();
                if (Math.random() < 0.35) spawn();
            }, 170);
        }

        // ---------- Genie happy bounce (Step 7) ----------
        function genieHappyBounce(durationMs) {
            const baseTransform = genie.style.transform || '';
            const anim = genie.animate(
                [
                    { transform: baseTransform + ' translateY(0)    rotate(0deg)' },
                    { transform: baseTransform + ' translateY(-22px) rotate(-4deg)' },
                    { transform: baseTransform + ' translateY(0)    rotate(0deg)' },
                    { transform: baseTransform + ' translateY(-14px) rotate(4deg)' },
                    { transform: baseTransform + ' translateY(0)    rotate(0deg)' }
                ],
                { duration: 680, iterations: Math.max(1, Math.round(durationMs / 680)), easing: 'ease-in-out' }
            );
            anim.addEventListener('finish', () => {
                genie.style.transform = baseTransform;
            });
        }

        // ---------- Step 5: success — hide pour, sparkle, glow + bounce ----------
        function successEffect() {
            return new Promise(resolve => {
                playSound('success');

                // Freeze the animated dispenser drain on the SAME frame the pour
                // stream stops, so the jar drain and the nozzle stream end
                // together (the core fill-bug fix).
                freezeDispenserDrain();

                // Pour stream stops only AFTER the container is full.
                if (fxRefs.pourStream) {
                    const s = fxRefs.pourStream;
                    s.style.transition = 'height 180ms ease-out, opacity 220ms ease-out';
                    s.style.opacity = '0';
                    s.style.height  = '0px';
                    setTimeout(() => { s.remove(); }, 240);
                    fxRefs.pourStream = null;
                }

                createSparkles(tallWrap, 22);   // sparkle burst on a full fill (ring removed)

                const base = fxRefs.wrapTargetTransform;
                const glow0 = 'drop-shadow(0 0 0 rgba(255,210,90,0))';
                const glowA = 'drop-shadow(0 0 18px rgba(255,210,90,0.95)) drop-shadow(0 0 32px rgba(255,160,30,0.65))';
                const glowB = 'drop-shadow(0 0 10px rgba(255,210,90,0.7))';

                const anim = tallWrap.animate(
                    [
                        { transform: base + ' scale(1)',    filter: glow0 },
                        { transform: base + ' scale(1.12)', filter: glowA },
                        { transform: base + ' scale(0.96)', filter: glowB },
                        { transform: base + ' scale(1.06)', filter: glowA },
                        { transform: base + ' scale(1)',    filter: glow0 }
                    ],
                    { duration: 900, easing: 'ease-in-out' }
                );
                anim.addEventListener('finish', resolve);
            });
        }

        // ---------- Particle: sparkles around the wrapper ----------
        function createSparkles(targetEl, count) {
            const r  = targetEl.getBoundingClientRect();
            const cx = r.left + r.width  / 2;
            const cy = r.top  + r.height / 2;
            const radius = Math.max(r.width, r.height) * 0.55;

            for (let i = 0; i < count; i++) {
                const size = 5 + Math.random() * 9;
                const p    = toStage(cx, cy);

                const s = document.createElement('div');
                s.className = 'fx-sparkle';
                s.style.left   = (p.x - size / 2) + 'px';
                s.style.top    = (p.y - size / 2) + 'px';
                s.style.width  = size + 'px';
                s.style.height = size + 'px';
                s.style.opacity = '1';
                s.style.transition = 'transform 900ms cubic-bezier(0.2,0.7,0.25,1), opacity 900ms ease-in';
                stage.appendChild(s);

                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.6;
                const dist  = radius * (0.6 + Math.random() * 0.9);

                requestAnimationFrame(() => {
                    s.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(0.35)`;
                    s.style.opacity   = '0';
                });
                setTimeout(() => s.remove(), 950);
            }
        }

        // ---------- Step 6: return wrapper to its original spot (KEEP liquid) ----------
        function returnTall() {
            return new Promise(resolve => {
                tallWrap.style.transition = `transform ${RETURN_MS}ms cubic-bezier(0.4, 0, 0.2, 1)`;
                requestAnimationFrame(() => {
                    tallWrap.style.transform = '';
                });

                setTimeout(() => {
                    tallWrap.style.transition = '';
                    tallWrap.style.zIndex = '';
                    tallWrap.style.filter = '';   // clear any leftover glide glow
                    fxRefs.wrapTargetTransform = '';
                    resolve();
                }, RETURN_MS + 20);
            });
        }

        // ---------- Orchestrator ----------
        async function runTallFillSequence() {
            if (gameState.busy) return;
            gameState.busy = true;
            currentState = GAME_STATES.TUTORIAL_FILL_TALL;
            document.body.classList.add('fx-busy');

            try {
                // Reset the glass to empty before a fresh fill so the SMIL
                // animation in the juice SVG can restart cleanly.
                const currentSrc = tall.getAttribute('src') || '';
                if (currentSrc.indexOf('orange_juice') !== -1) {
                    tall.src = EMPTY_GLASS_SRC;
                    await wait(120);
                }
                // Reset the dispenser to full and clear any drain mask so the
                // fresh fill starts from a clean, full jar.
                setDispenserFull();
                // Defensive: clear any leftover CSS-fill state.
                tallLiquid.classList.remove('full');

                // Reset wide container + tall drain overlay for a fresh run.
                wide.src = WIDE_EMPTY_SRC;
                if (wideLiquid) wideLiquid.classList.remove('partial');
                if (tallDrainMask) tallDrainMask.classList.remove('active');

                await moveTallToTap();   // 1
                startPour();             // 2 (pour starts, runs in parallel)
                await fillTall();        // 3-4 fill + bubbles + genie bounce
                await successEffect();   // 5 sparkle + glow + bounce; pour hidden HERE
                await returnTall();      // 6 wrapper moves back; liquid persists

                // Advance the tutorial: now ask the player to pour into wide.
                currentStep = STEPS.TAP_POUR_TO_WIDE;
                currentState = GAME_STATES.TUTORIAL_POUR_TO_WIDE;
                showInstructionThenEnable('Tap to pour it into<br>the other container.', wideWrap);
            } catch (err) {
                console.error('Tall fill sequence error:', err);
            } finally {
                if (fxRefs.bubbleTimer) {
                    clearInterval(fxRefs.bubbleTimer);
                    fxRefs.bubbleTimer = null;
                }
                if (fxRefs.pourStream) { fxRefs.pourStream.remove(); fxRefs.pourStream = null; }
                document.body.classList.remove('fx-busy');
                gameState.busy = false;
            }
        }

        // ---------- Wire up clicks ----------
        tallWrap.addEventListener('click', () => {
            if (gameState.busy || !gameState.canInteract) return;

            if (currentStep === STEPS.TAP_FILL_TALL) {
                clearActiveTapTargets();
                runTallFillSequence();
            }
        });

        // ---------- Shared stream cleanup ----------
        function stopPourStream() {
            if (!fxRefs.pourStream) return;
            const s = fxRefs.pourStream;
            s.style.transition = 'height 180ms ease-out, opacity 220ms ease-out';
            s.style.opacity = '0';
            s.style.height = '0px';
            setTimeout(() => s.remove(), 240);
            fxRefs.pourStream = null;
        }

        // ---------- Stream from tilted tall mouth into wide container ----------
        function startTallToWidePour() {
            playSound('pour');

            const tallR = tallWrap.getBoundingClientRect();
            const wideR = wideWrap.getBoundingClientRect();

            // For the tilted bottle: use lower-right mouth area after rotation
            const fromV = {
                x: tallR.left + tallR.width * 0.72,
                y: tallR.top  + tallR.height * 0.78
            };

            // Land inside the wide jar mouth
            const toV = {
                x: wideR.left + wideR.width * 0.50,
                y: wideR.top  + wideR.height * 0.18
            };

            const from = toStage(fromV.x, fromV.y);
            const to   = toStage(toV.x,   toV.y);

            const dx     = to.x - from.x;
            const dy     = to.y - from.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle  = Math.atan2(dy, dx) * 180 / Math.PI;

            const streamW = Math.max(7, Math.round(stage.clientWidth * 0.0045));

            const stream = document.createElement('div');
            stream.className = 'fx-pour-stream';
            stream.style.left   = from.x + 'px';
            stream.style.top    = from.y + 'px';
            stream.style.width  = streamW + 'px';
            stream.style.height = '0px';
            stream.style.transformOrigin = 'top center';
            stream.style.transform = `rotate(${angle - 90}deg)`;
            stream.style.transition = 'height 420ms ease-in-out';
            stream.style.opacity = '0.92';
            stage.appendChild(stream);

            fxRefs.pourStream = stream;

            requestAnimationFrame(() => {
                stream.style.height = length + 'px';
            });
        }

        // ---------- Animated SVG pour (overlay) ----------
        // Shows ASSETS/juice-pour.svg for one full SMIL cycle, then hides it.
        // The reused overlay <img> gets a cache-busted src on each play so the
        // SMIL timeline restarts cleanly from the beginning.
        // Show the pour SVG in the SAME shared #pour-area box as the two
        // containers (it fills the box via CSS), hiding the containers so it
        // replaces them in place.
        // Position the pour SVG over the COMBINED bounding box of the two real
        // containers (which keep their own positions/sizes). object-fit:fill
        // stretches the artwork to that exact area — no shrink, no jump.
        function positionPourSvgExactlyOverContainers() {
            const stageBox = stage.getBoundingClientRect();
            const tallBox  = tallWrap.getBoundingClientRect();
            const wideBox  = wideWrap.getBoundingClientRect();
            const left   = Math.min(tallBox.left,   wideBox.left)   - stageBox.left;
            const right  = Math.max(tallBox.right,  wideBox.right)  - stageBox.left;
            const bottom = Math.max(tallBox.bottom, wideBox.bottom) - stageBox.top;

            // Span the full horizontal extent of both containers (dynamic), then
            // scale up around the box centre so the art reads at full size. Keep
            // the height tied to the artwork's own aspect ratio so it is never
            // squished or stretched. Anchor near the bottom — where the
            // receiving jar + splash land over the destination container — so
            // enlarging grows the lifted/tilted source upward, not off the table.
            const baseWidth = right - left;
            const centerX   = left + baseWidth / 2;

            // Size to the EXACT combined span of the two real containers (NO
            // upscale — the old 1.35× POUR_BOX_SCALE is what made the SVG's
            // drawn jars look bigger than the real jars and "jump" on swap).
            // The box keeps the artwork's own aspect, so object-fit:fill does
            // not stretch it: the depicted jars now read at the real jars' scale.
            const width  = baseWidth;
            const height = width / POUR_ART_ASPECT;

            htmlPourImg.style.left   = (centerX - width / 2) + 'px';
            htmlPourImg.style.top    = (bottom - height) + 'px';
            htmlPourImg.style.width  = width + 'px';
            htmlPourImg.style.height = height + 'px';
            htmlPourImg.style.transform = 'none';
            htmlPourImg.style.objectFit = 'fill';
        }

        function showPourAnimationInSamePlace() {
            positionPourSvgExactlyOverContainers();
            tallWrap.style.visibility = 'hidden';
            wideWrap.style.visibility = 'hidden';
            htmlPourImg.style.display = 'block';
            htmlPourImg.src = HTML_POUR_SRC + '?t=' + Date.now();   // cache-bust → restart SMIL
        }

        function hidePourAnimationAndShowFinalState() {
            htmlPourImg.style.display = 'none';
            htmlPourImg.src = '';
            tallWrap.style.visibility = 'visible';
            wideWrap.style.visibility = 'visible';
            tall.src = TALL_EMPTY_SRC;              // ASSETS/TAll container.svg
            wide.src = WIDE_HALF_SRC + '?t=' + Date.now();   // ASSETS/half-wide.svg
        }

        function playHtmlPourAnimation() {
            return new Promise(resolve => {
                showPourAnimationInSamePlace();
                playSound('pour');
                // Hold one full cycle, then restore the final container states.
                setTimeout(() => {
                    hidePourAnimationAndShowFinalState();
                    resolve();
                }, HTML_POUR_MS);
            });
        }

        // ---------- Pour-to-wide sequence (animated SVG drives it) ----------
        // The animated juice-pour.svg plays the lift + tilt + stream + splash.
        // Static tall/wide stage props stay hidden under the overlay, then are
        // revealed with their final states (tall empty, wide partially filled).
        async function runPourToWideSequence() {
            if (gameState.busy) return;

            gameState.busy = true;
            gameState.canInteract = false;
            document.body.classList.add('fx-busy');

            try {
                currentStep = STEPS.POURING_TO_WIDE;

                // Show both static containers on the table to start.
                tall.src = TALL_EMPTY_SRC || EMPTY_GLASS_SRC;   // TAll container.svg
                wide.src = WIDE_EMPTY_SRC;                       // Wide Container.svg
                if (tallDrainMask) tallDrainMask.classList.remove('active');

                createSparkles(wideWrap, 8);

                // Play the pour: hides the containers, shows juice-pour.svg in
                // the SAME box, then restores tall=empty / wide=half-wide.svg.
                await playHtmlPourAnimation();
                await wait(120);

                createSparkles(wideWrap, 14);

                // Concept explanation — awaited so the flow stays fully locked
                // until the quiz opens (no taps possible mid-explanation).
                gameState.canInteract = false;
                setGeniePose('54%', '22%', 4);   // lean toward the wide cup (right)
                showStageGuide();

                await typeDialogueAwait('Look! There is still<br>space left.');
                await wait(LINE_HOLD_MS);
                await typeDialogueAwait('This container<br>holds more juice.');
                await wait(LINE_HOLD_MS);

                currentStep = STEPS.EXPLAIN_MORE;
                hideGuide();
                resetGeniePose();
                await wait(360);
                showCapacityQuiz();
            } finally {
                document.body.classList.remove('fx-busy');
                gameState.busy = false;
            }
        }

        /* =========================================================
           LEVEL 2 — wide → tall overflow variation.
           Fill the wide jar, pour it into the tall jar; the tall jar
           cannot hold it all, so it overflows — proving (again) that
           the WIDE jar holds more juice. Reuses the same shared quiz.
           ========================================================= */

        // Single source of truth for what the level-2 table scene is currently
        // showing. Kept stable across the explanation/quiz screens so they can
        // assert the final "proof" state without re-running art (see
        // showWideToTallOverflowExplanation + validateOverflowPourOverlay).
        const tutorialVisualState = {
            dispenser:    'full',     // full | paused
            tall:         'empty',    // empty | filled
            wide:         'empty',    // empty | full   (after pouring it is EMPTY)
            spillVisible: false
        };

        // Stamp the post-overflow proof state. Called once the overflow SVG
        // ends — NOT before — so the bookkeeping matches what is on screen.
        // NOTE: the wide jar poured its juice OUT, so it is 'empty' (NOT
        // 'overflow' — the tall jar is the one that overflowed).
        function setOverflowVisualState() {
            tutorialVisualState.dispenser    = 'paused';
            tutorialVisualState.tall         = 'filled';
            tutorialVisualState.wide         = 'empty';
            tutorialVisualState.spillVisible = true;
        }

        // Apply the frozen proof state to the DOM WITHOUT replaying any art:
        // tall stays the frozen filled glass, wide stays empty, spill follows
        // the flag. Safe to call repeatedly from explanation/quiz screens — it
        // never restarts a fill SVG, refills the wide jar, or resets the
        // dispenser. (Setting the same src string is a no-op, so no reload.)
        function applyTutorialVisualState() {
            const s = tutorialVisualState;
            if (s.tall === 'filled' && (tall.getAttribute('src') || '').indexOf('orange_juice') === -1) {
                // Only if somehow not already the filled glass — and frozen,
                // not re-animated, by reusing the (cached) src with no cache-bust.
                tall.src = TALL_FULL_SRC;
            }
            if (s.wide === 'empty') wide.src = WIDE_EMPTY_SRC;   // same string = no reload
            if (s.spillVisible) showOverflowSpill(); else hideOverflowSpill();
        }

        // Restore the base table scene: dispenser full, both containers empty.
        function resetTableSceneForLevel2() {
            tutorialVisualState.dispenser    = 'full';
            tutorialVisualState.tall         = 'empty';
            tutorialVisualState.wide         = 'empty';
            tutorialVisualState.spillVisible = false;
            setDispenserFull();   // full jar + cleared drain mask
            tall.src  = TALL_EMPTY_SRC;
            wide.src  = WIDE_EMPTY_SRC;
            tallLiquid.classList.remove('full');
            if (tallDrainMask) tallDrainMask.classList.remove('active');
            if (wideLiquid)    wideLiquid.classList.remove('partial');
            document.body.classList.remove('scene-playing', 'fx-busy');
            tallWrap.style.transform = '';
            wideWrap.style.transform = '';
            tallWrap.style.zIndex = '';
            wideWrap.style.zIndex = '';
            tallWrap.style.visibility = 'visible';
            wideWrap.style.visibility = 'visible';
            resetGeniePose();     // clear pose: position, tilt + pointing bob
            hideOverflowSpill();
        }

        // Overflow spill puddle around the base of the tall jar. Idempotent:
        // if the puddle already exists, it is REPOSITIONED (the jar may have
        // moved) and only its show transition is replayed — never duplicated.
        let tallSpillEl = null;
        function showOverflowSpill() {
            if (!tallSpillEl) {
                tallSpillEl = document.createElement('div');
                tallSpillEl.id = 'tall-spill';
                stage.appendChild(tallSpillEl);
            }
            const sr = stage.getBoundingClientRect();
            const r  = tallWrap.getBoundingClientRect();
            const w  = r.width * 2.6;
            const h  = r.height * 0.16;
            tallSpillEl.style.width  = w + 'px';
            tallSpillEl.style.height = h + 'px';
            tallSpillEl.style.left   = (r.left - sr.left + r.width / 2 - w / 2) + 'px';
            tallSpillEl.style.top    = (r.bottom - sr.top - h * 0.45) + 'px';
            // Drop + reflow + re-add so the entrance transition replays cleanly
            // even when the puddle was already on screen (no second element).
            tallSpillEl.classList.remove('show');
            void tallSpillEl.offsetWidth;
            tallSpillEl.classList.add('show');
            tutorialVisualState.spillVisible = true;
        }
        function hideOverflowSpill() {
            if (tallSpillEl) tallSpillEl.classList.remove('show');
            tutorialVisualState.spillVisible = false;
        }

        // The "magical" overflow beat — fired once during the SVG's final ~1.5s
        // (the baked-in overflow/spill frames). Kept deliberately subtle: a
        // small sparkle shimmer, an expanding ring, the persistent spill puddle
        // and a single soft chime. (The odd extra "spill drops" particle burst
        // was removed — the SVG already paints its own splash.)
        function triggerOverflowMagic() {
            createSparkles(tallWrap, 12);   // sparkle shimmer only (ring removed)
            showOverflowSpill();          // idempotent persistent puddle
            playSound('success');         // gentle by design — played once
        }

        // Tunable alignment for the overflow scene overlay. Tweak these instead
        // of hardcoding magic numbers in the fit function.
        const OVERFLOW_SVG_ALIGN = {
            scale: 1.0,            // 1.0 = match the real jar zone exactly
            xOffsetPct: 0,         // +right / -left, as % of the jar-span width
            yOffsetPct: 0,         // +down / -up,    as % of the jar-zone height
            baselineOffsetPct: 0,  // nudge the baseline below the jar bottoms
            // The asset is drawn wide-jar-LEFT / tall-jar-RIGHT, but the real
            // table is tall-LEFT / wide-RIGHT. Mirror horizontally so the scene
            // matches (wide still pours into tall — just flipped).
            mirror: true
        };

        // Lock the overflow scene to the REAL jars: the overlay box is the
        // combined bounding box of tall+wide (× scale), and object-fit:contain
        // scales the artwork inside WITHOUT stretching, anchored bottom-centre
        // (object-position) so the scene's baseline sits on the same table line
        // as the real jars and its jars read at the real jars' size — no scale
        // jump when the SVG appears or clears.
        function fitOverflowSvgToRealJars() {
            const cfg = OVERFLOW_SVG_ALIGN;
            const sr = stage.getBoundingClientRect();
            const tallBox = tallWrap.getBoundingClientRect();
            const wideBox = wideWrap.getBoundingClientRect();
            const left   = Math.min(tallBox.left,   wideBox.left)   - sr.left;
            const right  = Math.max(tallBox.right,  wideBox.right)  - sr.left;
            const top    = Math.min(tallBox.top,    wideBox.top)    - sr.top;
            const bottom = Math.max(tallBox.bottom, wideBox.bottom) - sr.top;

            const spanW = right - left;
            const zoneH = bottom - top;
            const bw = spanW * cfg.scale;
            const bh = zoneH * cfg.scale;
            const cx = left + spanW / 2 + (cfg.xOffsetPct / 100) * spanW;
            const baseY = bottom + ((cfg.baselineOffsetPct + cfg.yOffsetPct) / 100) * zoneH;

            htmlPourImg.style.left           = (cx - bw / 2) + 'px';
            htmlPourImg.style.top            = (baseY - bh) + 'px';
            htmlPourImg.style.width          = bw + 'px';
            htmlPourImg.style.height         = bh + 'px';
            htmlPourImg.style.transform      = cfg.mirror ? 'scaleX(-1)' : 'none';  // tall→left, wide→right
            htmlPourImg.style.objectFit      = 'contain';        // preserve aspect, no stretch
            htmlPourImg.style.objectPosition = 'center bottom';  // baseline aligned to jars
        }
        // Back-compat alias for existing callers.
        const positionOverflowPourOverScene = fitOverflowSvgToRealJars;

        // Wide → tall OVERFLOW overlay. Plays ASSETS/juice-pour-overflow_7.svg
        // (wide pouring · tall receiving · overflow · spill) over the real jar
        // area, then fades out and reveals the final proof state. Owns the whole
        // lifecycle — callers don't set tall/wide srcs themselves.
        function playReversePourAnimation() {
            return new Promise(resolve => {
                // 1) Lay the scene over the real two-jar area; hide the real
                //    jars (visibility, so layout/size never jumps) so the SVG
                //    stands in for them in place.
                positionOverflowPourOverScene();
                tallWrap.style.visibility = 'hidden';
                wideWrap.style.visibility = 'hidden';

                // Pre-fill the (hidden) tall jar BEHIND the overlay: its ~4.2s
                // fill SVG runs out of sight and freezes full well before the
                // 6.2s scene ends, so when the overlay clears the real tall jar
                // is ALREADY full — no empty-then-refill jump, and nothing has
                // to be "restored" afterwards.
                tall.src = TALL_FULL_SRC + '?t=' + Date.now();

                htmlPourImg.style.transition = 'opacity 360ms ease';
                htmlPourImg.style.opacity    = '1';
                htmlPourImg.style.display    = 'block';
                // objectFit/objectPosition/transform are set by
                // fitOverflowSvgToRealJars() above (contain + bottom + mirror).
                // Do NOT override to 'fill' here — that stretched the scene.
                // Cache-bust so the bundled SMIL timeline restarts from frame 0.
                htmlPourImg.src = WIDE_TO_TALL_OVERFLOW_POUR_SRC + '?t=' + Date.now();
                playSound('pour');

                // 2) During the LAST 1.5s — the overflow/spill beat baked into
                //    the SVG — layer the magical FX over the on-screen overflow.
                const magicAt = Math.max(0, WIDE_TO_TALL_OVERFLOW_MS - 1500);
                const magicTimer = setTimeout(triggerOverflowMagic, magicAt);

                // 3) When the SVG ends: fade the overlay out (180ms), set the
                //    final proof state WHILE the real jars are still hidden, then
                //    fade the real jars back in — so there is no position/size
                //    pop. Jar srcs are touched only here, after the SVG finishes.
                setTimeout(() => {
                    clearTimeout(magicTimer);
                    htmlPourImg.style.transition = 'opacity 180ms ease';
                    htmlPourImg.style.opacity = '0';
                    setTimeout(() => {
                        // --- set final state while everything is hidden ---
                        // Tall is already full (filled behind the overlay) — do
                        // NOT re-set tall.src (that would restart its fill and
                        // flash empty); we just keep the frozen filled glass.
                        wide.src = WIDE_EMPTY_SRC;          // wide poured out → empty
                        showOverflowSpill();                // persistent puddle
                        setOverflowVisualState();

                        htmlPourImg.style.display    = 'none';
                        htmlPourImg.src              = '';
                        htmlPourImg.style.opacity    = '1';
                        htmlPourImg.style.transition = '';

                        // --- fade the real jars back in (no pop) ---
                        [tallWrap, wideWrap].forEach(el => {
                            el.style.transition = 'opacity 180ms ease';
                            el.style.opacity = '0';
                            el.style.visibility = 'visible';
                        });
                        requestAnimationFrame(() => {
                            tallWrap.style.opacity = '1';
                            wideWrap.style.opacity = '1';
                        });
                        setTimeout(() => {
                            tallWrap.style.transition = ''; tallWrap.style.opacity = '';
                            wideWrap.style.transition = ''; wideWrap.style.opacity = '';
                            resolve();
                        }, 200);
                    }, 180);   // matches the overlay fade-out above
                }, WIDE_TO_TALL_OVERFLOW_MS);
            });
        }

        // ---- Debug: play the wide → tall overflow pour in isolation ----
        // Drives just the overflow scene + final proof state (no fill step,
        // no quiz) so the animation/overlay can be eyeballed on demand.
        async function playWideToTallOverflowPour() {
            const wasBusy = gameState.busy;
            gameState.busy = true;
            document.body.classList.add('fx-busy');
            try {
                tall.src = TALL_EMPTY_SRC;
                if (tallDrainMask) tallDrainMask.classList.remove('active');
                await playReversePourAnimation();
            } finally {
                document.body.classList.remove('fx-busy');
                gameState.busy = wasBusy;
            }
            return getTutorialVisualState();
        }

        // ---- Debug: validate the overflow overlay lines up with the jars ----
        // Non-destructive when the overlay is idle: positions the (hidden)
        // overlay over the real two-jar area, then reports how well its box
        // covers the combined jar box plus the current proof state. Logged as a
        // table for quick inspection.
        function getTutorialVisualState() {
            return Object.assign({}, tutorialVisualState);
        }
        function validateOverflowPourOverlay() {
            const live = htmlPourImg.style.display === 'block';
            if (!live) positionOverflowPourOverScene();   // safe: still hidden

            const sr = stage.getBoundingClientRect();
            const tallBox = tallWrap.getBoundingClientRect();
            const wideBox = wideWrap.getBoundingClientRect();
            const combined = {
                left:   Math.min(tallBox.left,   wideBox.left)   - sr.left,
                right:  Math.max(tallBox.right,  wideBox.right)  - sr.left,
                bottom: Math.max(tallBox.bottom, wideBox.bottom) - sr.top
            };
            const ov = {
                left:   parseFloat(htmlPourImg.style.left)   || 0,
                top:    parseFloat(htmlPourImg.style.top)    || 0,
                width:  parseFloat(htmlPourImg.style.width)  || 0,
                height: parseFloat(htmlPourImg.style.height) || 0
            };
            const ovCenterX  = ov.left + ov.width / 2;
            const boxCenterX = combined.left + (combined.right - combined.left) / 2;

            const report = {
                src:                WIDE_TO_TALL_OVERFLOW_POUR_SRC,
                durationMs:         WIDE_TO_TALL_OVERFLOW_MS,
                overlayLive:        live,
                objectFit:          getComputedStyle(htmlPourImg).objectFit,   // expect 'contain'
                centeredOnJars:     Math.abs(ovCenterX - boxCenterX) < 2,
                baselineOnJars:     Math.abs((ov.top + ov.height) - combined.bottom) < 2,
                overlayBoxPx:       Math.round(ov.width) + 'x' + Math.round(ov.height),
                jarSpanWidthPx:     Math.round(combined.right - combined.left),
                jarsHidden:         tallWrap.style.visibility === 'hidden' && wideWrap.style.visibility === 'hidden',
                spillElementExists: !!tallSpillEl,
                spillVisible:       !!(tallSpillEl && tallSpillEl.classList.contains('show')),
                visualState:        getTutorialVisualState()
            };
            try { console.table(report); } catch (e) { /* ignore */ }
            return report;
        }
        // Alias matching the upgraded-prompt name.
        const validateOverflowSvgScale = validateOverflowPourOverlay;

        // ---- Debug: where the wide jar lands under the tap (grounded check) ----
        function validateWideTapPlacement() {
            const sr  = stage.getBoundingClientRect();
            const wr  = wideWrap.getBoundingClientRect();
            const tap = getTapPoint();
            const a   = CONTAINER_ANCHORS.wide;
            const report = {
                anchor:           JSON.stringify(a),
                tapY:             Math.round(tap.y - sr.top),
                jarTopFromTop:    Math.round(wr.top - sr.top),
                jarBottomFromTop: Math.round(wr.bottom - sr.top),
                stageHeight:      Math.round(sr.height),
                // True if the jar bottom sits within the visible stage (not
                // floating below the counter/off-screen).
                bottomOnStage:    (wr.bottom - sr.top) <= sr.height + 2,
                transform:        wideWrap.style.transform || '(none)'
            };
            try { console.table(report); } catch (e) {}
            return report;
        }
        function debugTutorialVisualState() {
            const s = getTutorialVisualState();
            try { console.table(s); } catch (e) {}
            return s;
        }

        // ---- Debug: confirm the overlay shows tall-LEFT / wide-RIGHT ----
        // The asset is authored wide-left/tall-right; OVERFLOW_SVG_ALIGN.mirror
        // flips it. Real DOM: tall-wrap is left of wide-wrap. This reports both.
        function validateOverflowJarOrder() {
            const t = tallWrap.getBoundingClientRect();
            const w = wideWrap.getBoundingClientRect();
            const report = {
                realTallCenterX:  Math.round(t.left + t.width / 2),
                realWideCenterX:  Math.round(w.left + w.width / 2),
                realOrder:        (t.left < w.left) ? 'tall-left / wide-right' : 'wide-left / tall-right',
                overlayMirrored:  OVERFLOW_SVG_ALIGN.mirror,
                overlayTransform: getComputedStyle(htmlPourImg).transform,
                // After mirror, the asset's tall (drawn right) renders left →
                // matches the real tall-left / wide-right.
                effectiveOrder:   OVERFLOW_SVG_ALIGN.mirror ? 'tall-left / wide-right' : 'wide-left / tall-right',
                matchesReal:      (t.left < w.left) === OVERFLOW_SVG_ALIGN.mirror
            };
            try { console.table(report); } catch (e) {}
            return report;
        }

        // ---- Debug: confirm Gogo / bubble / text stacking + no overlap ----
        function validateGuideLayering() {
            const z = (el) => getComputedStyle(el).zIndex;
            const overlaps = (a, b) =>
                !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
            const g = genie.getBoundingClientRect();
            const d = dialogue.getBoundingClientRect();
            const report = {
                genieZ:        z(genie),       // expect 6
                bubbleZ:       z(dialogue),    // expect 8
                textZ:         z(dialogueText),// expect 9
                bubbleAboveGogo: (+z(dialogue) > +z(genie)),
                textAboveBubble: (+z(dialogueText) > +z(dialogue)),
                gogoOverlapsBubble: overlaps(g, d),
                gogoTopFromStage:  Math.round(g.top - stage.getBoundingClientRect().top)
            };
            try { console.table(report); } catch (e) {}
            return report;
        }

        // Entry: reset → show empty tall + wide → ask to fill the wide jar.
        async function startWideToTallOverflowLevel() {
            hideCapacityQuiz();
            resetTableSceneForLevel2();
            currentStep  = STEPS.L2_TAP_FILL_WIDE;
            currentState = GAME_STATES.TUTORIAL_POUR_TO_WIDE;
            await wait(300);
            showInstructionThenEnable('Tap to fill this<br>container.', wideWrap);
        }

        // ----- Wide jar movement (same style as moveTallToTap / returnTall) -----
        // Slide the wide jar up under the dispenser nozzle, aligning its mouth
        // with the tap point, then sit it just below so the pour stream shows.
        let wideTargetTransform = '';
        // Anchor-based, magically-guided glide (shared with the tall jar). The
        // 'wide' anchor uses a small tapYOffset so the short jar stays grounded
        // under the spout instead of floating below the counter.
        function moveWideToTap() { return moveContainerToTap(wideWrap, 'wide'); }

        // Pour stream from the nozzle into the (moved) wide jar mouth.
        function startWidePour() {
            playSound('pour');
            const tap = getTapPoint();
            const wr  = wideWrap.getBoundingClientRect();   // moved position

            const from = toStage(tap.x, tap.y);
            const to   = toStage(wr.left + wr.width * 0.50, wr.top + wr.height * 0.82);

            const streamW = Math.max(10, Math.round(stage.clientWidth * 0.007));
            const fullH   = Math.max(80, to.y - from.y);

            const stream = document.createElement('div');
            stream.className = 'fx-pour-stream';
            stream.style.left   = (from.x - streamW / 2) + 'px';
            stream.style.top    = from.y + 'px';
            stream.style.width  = streamW + 'px';
            stream.style.height = '0px';
            stream.style.transition = 'height 520ms ease-in-out';
            stage.appendChild(stream);
            fxRefs.pourStream = stream;

            requestAnimationFrame(() => { stream.style.height = fullH + 'px'; });
        }

        // Return the wide jar to its original position (keeps the filled art).
        function returnWide() {
            return new Promise(resolve => {
                wideWrap.style.transition = `transform ${RETURN_MS}ms cubic-bezier(0.4, 0, 0.2, 1)`;
                requestAnimationFrame(() => { wideWrap.style.transform = ''; });
                setTimeout(() => {
                    wideWrap.style.transition = '';
                    wideWrap.style.zIndex = '';
                    wideWrap.style.filter = '';   // clear any leftover glide glow
                    wideTargetTransform = '';
                    resolve();
                }, RETURN_MS + 20);
            });
        }

        // Tap 1: wide jar moves under the nozzle, fills (liquid + soda bubbles),
        // then returns to its original position — same flow style as the tall jar.
        async function runWideFillSequence() {
            if (gameState.busy) return;
            gameState.busy = true;
            gameState.canInteract = false;
            document.body.classList.add('fx-busy');
            clearActiveTapTargets();

            try {
                currentStep = STEPS.L2_FILLING_WIDE;

                // Start from a clean state: empty wide + full dispenser.
                wide.src  = WIDE_EMPTY_SRC;
                setDispenserFull();
                await wait(60);

                // 1) Move the wide jar under the dispenser nozzle (NOT in-place).
                await moveWideToTap();

                // 2) Pour stream from the nozzle; dispenser plays the animated
                //    drain SVG, frozen below when the wide fill + stream finish.
                startWidePour();
                startDispenserDrain();

                // 3) Swap the wide art to the animated fill SVG so the juice
                //    rises inside it with soda bubbles (keeps its size/design).
                wide.src = WIDE_FILL_JAR_SRC + '?t=' + Date.now();

                // Wait for the fill animation to finish (SVG freezes full).
                await wait(WIDE_FILL_JAR_MS);

                // 4) Stop the stream + freeze the dispenser drain together, then
                //    celebrate.
                stopPourStream();
                freezeDispenserDrain();
                createSparkles(wideWrap, 18);
                playSound('success');
                await wait(300);

                // 5) Smoothly return the wide jar to its original spot; it stays
                //    visually full (frozen fill SVG persists).
                await returnWide();

                // Tap 2 prompt: pour the wide jar into the other (tall) container.
                currentStep = STEPS.L2_TAP_POUR_TO_TALL;
                showInstructionThenEnable('Tap to pour it into<br>the other container.', wideWrap);
            } finally {
                if (fxRefs.pourStream) { fxRefs.pourStream.remove(); fxRefs.pourStream = null; }
                document.body.classList.remove('fx-busy');
                gameState.busy = false;
            }
        }

        // Tap 2: pour the wide jar into the tall jar → overflow → explain → quiz.
        // Shared Level-2 (wide → tall) overflow explanation. Same table scene
        // placement for BOTH the correct and the wrong-answer quiz paths:
        //   tall container full/overflowed · wide empty on the right ·
        //   spill on the table · Gogo pointing near the tall overflow · bubble
        //   top-right. Four screens, gentle pacing.
        async function showWideToTallOverflowExplanation() {
            // Freeze-apply the proof state only — never replay the SVG, reset
            // the dispenser, refill the wide jar, or restart the tall fill.
            setOverflowVisualState();
            applyTutorialVisualState();

            // Gogo glides to the explanation pose ABOVE the jars (auto-nudged
            // clear of both containers) so he never overlaps the proof area.
            applyGuidePose('wideLevelExplain');

            showStageGuide();

            await typeDialogueAwait('But the juice<br>overflowed.');
            await wait(LINE_HOLD_MS);

            await typeDialogueAwait('We poured all the<br>juice here.');
            await wait(LINE_HOLD_MS);

            await typeDialogueAwait('So this container<br>can hold less juice.');
            await wait(LINE_HOLD_MS);

            await typeDialogueAwait('And this one can<br>hold more juice.');
            await wait(LINE_HOLD_MS);

            hideGuide();
            resetGeniePose();
        }

        async function runWideToTallPourSequence() {
            if (gameState.busy) return;
            gameState.busy = true;
            gameState.canInteract = false;
            document.body.classList.add('fx-busy');
            clearActiveTapTargets();

            try {
                currentStep = STEPS.L2_POURING_TO_TALL;

                // Starting art for the pour: tall empty. The wide jar keeps the
                // frozen-full fill SVG from runWideFillSequence (no re-swap, so
                // its fill animation doesn't restart).
                tall.src = TALL_EMPTY_SRC;
                if (tallDrainMask) tallDrainMask.classList.remove('active');

                createSparkles(tallWrap, 8);

                // The overflow scene drives the whole result: it sets tall=
                // full/overflow · wide=empty · spill the moment the SVG ends
                // (and fires the magical overflow beat in its last 1.5s). We do
                // NOT re-set jar srcs here — that would double-swap / restart
                // artwork and risk a duplicate or out-of-sync jar.
                await playReversePourAnimation();
                await wait(120);

                createSparkles(tallWrap, 16);
                await wait(500);

                // Go STRAIGHT to the quiz — the overflow explanation now plays
                // AFTER the child answers (in the success flow), not before, so
                // the question comes first.
                currentStep = STEPS.QUIZ;
                showCapacityQuiz();
            } finally {
                document.body.classList.remove('fx-busy');
                gameState.busy = false;
            }
        }

        // ---------- Wide click: routes by current tutorial step ----------
        wideWrap.addEventListener('click', () => {
            if (gameState.busy || !gameState.canInteract) return;

            if (currentStep === STEPS.TAP_POUR_TO_WIDE) {
                clearActiveTapTargets();
                runPourToWideSequence();
                return;
            }

            // Level 2 routing: fill the wide jar, then pour it into the tall jar.
            if (currentStep === STEPS.L2_TAP_FILL_WIDE) {
                clearActiveTapTargets();
                runWideFillSequence();
                return;
            }
            if (currentStep === STEPS.L2_TAP_POUR_TO_TALL) {
                clearActiveTapTargets();
                runWideToTallPourSequence();
                return;
            }

            // Default tiny press feedback for any other state.
            wideWrap.animate(
                [
                    { transform: 'scale(1)' },
                    { transform: 'scale(0.94)' },
                    { transform: 'scale(1)' }
                ],
                { duration: 180, easing: 'ease-out' }
            );
        });

        // ---------- Capacity quiz: gamified entrance + answer flow ----------
        let quizIdleTimer = null;

        function showCapacityQuiz() {
            currentStep = STEPS.QUIZ;
            currentState = GAME_STATES.TUTORIAL_QUIZ;
            gameState.canInteract = false;

            // Reset any prior state classes so re-entry plays clean.
            [leftChoice, rightChoice].forEach(el => {
                el.classList.remove('show', 'floating', 'correct', 'wrong');
            });
            quizPanel.classList.remove('show');

            // 1. Backdrop blur fades in.
            quizOverlay.classList.add('show');

            // 2. Quiz card pops from center.
            // Force a reflow so the keyframe restarts cleanly.
            void quizPanel.offsetHeight;
            quizPanel.classList.add('show');

            // 3. Both jar cards pop simultaneously.
            setTimeout(() => {
                leftChoice.classList.add('show');
                rightChoice.classList.add('show');
            }, 180);

            // 4. Settle into idle float + 5. enable interaction.
            setTimeout(() => {
                leftChoice.classList.add('floating');
                rightChoice.classList.add('floating');
                gameState.canInteract = true;
                startQuizIdleHints();
            }, 900);
        }

        // Quiz idle pulse: if the child does nothing for 4s, pulse the
        // correct (wide) container. Any interaction resets the timer; the
        // pulse keeps returning until they actually answer.
        const QUIZ_IDLE_HINT_MS = 4000;
        let quizIdleArmed = false;
        const QUIZ_IDLE_EVENTS = ['mousemove', 'touchstart', 'click', 'keydown'];

        function armQuizIdleTimer() {
            clearTimeout(quizIdleTimer);
            quizIdleTimer = setTimeout(() => {
                if (!quizIdleArmed) return;
                // Pause the float so the pulse transform isn't overridden.
                rightChoice.classList.remove('floating');
                rightChoice.classList.add('is-idle-pulse');
            }, QUIZ_IDLE_HINT_MS);
        }

        function startQuizIdlePulse() {
            quizIdleArmed = true;
            QUIZ_IDLE_EVENTS.forEach(ev =>
                document.addEventListener(ev, resetQuizIdlePulse, { passive: true }));
            armQuizIdleTimer();
        }

        function resetQuizIdlePulse() {
            if (!quizIdleArmed) return;
            if (rightChoice.classList.contains('is-idle-pulse')) {
                rightChoice.classList.remove('is-idle-pulse');
                rightChoice.classList.add('floating');
            }
            armQuizIdleTimer();   // restart the 4s countdown
        }

        function stopQuizIdlePulse() {
            quizIdleArmed = false;
            clearTimeout(quizIdleTimer);
            quizIdleTimer = null;
            rightChoice.classList.remove('is-idle-pulse');
            QUIZ_IDLE_EVENTS.forEach(ev =>
                document.removeEventListener(ev, resetQuizIdlePulse));
        }

        // Back-compat aliases for existing call sites.
        function startQuizIdleHints() { startQuizIdlePulse(); }
        function stopQuizIdleHints()  { stopQuizIdlePulse(); }

        function hideCapacityQuiz() {
            stopQuizIdleHints();
            quizOverlay.classList.remove('show');
            [leftChoice, rightChoice].forEach(el => {
                el.classList.remove('show', 'floating', 'correct', 'wrong');
            });
            quizPanel.classList.remove('show');
        }

        function onQuizAnswer(which) {
            if (!gameState.canInteract) return;
            stopQuizIdleHints();

            if (which === 'wide') {
                // CORRECT: pop ONLY the wide choice, then run the wide-quiz
                // success flow on the table scene. Never add .correct to both.
                gameState.canInteract = false;
                rightChoice.classList.remove('floating', 'is-idle-pulse');
                rightChoice.classList.add('correct');
                createSparkles(rightChoice, 24);   // bigger burst on correct
                addMagicRing(rightChoice);         // expanding magic ring
                playSound('success');

                setTimeout(() => {
                    currentStep = STEPS.SUCCESS;
                    showWideQuizSuccessFlow();
                }, 1000);
                return;
            }

            // WRONG: ONLY the tapped wrong jar (tall / leftChoice) shakes.
            // Do NOT pop or "correct" either jar. Then lose-Gogo feedback →
            // explanation → back to the quiz to try again.
            (async () => {
                gameState.canInteract = false;
                stopQuizIdleHints();

                leftChoice.classList.remove('floating', 'correct', 'is-idle-pulse');
                rightChoice.classList.remove('correct', 'is-idle-pulse');

                leftChoice.classList.add('wrong');
                playSound('pour');

                await wait(520);

                leftChoice.classList.remove('wrong');

                hideCapacityQuiz();
                await wait(300);

                await showLoseGogoFeedback();

                // Level 2 (wide → tall): reuse the same 4-screen overflow
                // explanation instead of the short "holds less juice" lines.
                if (tutorialLevel === TUTORIAL_LEVELS.WIDE_TO_TALL) {
                    await showWideToTallOverflowExplanation();
                    await wait(200);
                } else {
                    await showWrongQuizExplanation();
                }

                showCapacityQuiz();
            })();
        }

        // ---------- Wrong-answer feedback helpers ----------
        // Lose-Gogo overlay (same style/placement as the win-Gogo screen, but
        // ASSETS/loose gogo.png). Gentle — never harsh.
        function showLoseGogoFeedback() {
            return new Promise(resolve => {
                tutorialCelebrateImg.src = LOSE_GOGO_SRC;

        // ---------- Wide-quiz success: 4-screen flow on the table scene ----------
        // Plays after the CORRECT (wide) quiz answer. Reuses the stage genie /
        // dialogue / dialogue-text. All interaction is locked for the duration.
        // 3 narration screens → celebration → continue into the main game.
        function typeDialogueAwait(text) {
            // Wrap the existing typewriter in a promise (resolves when done).
            return new Promise(resolve => setDialogue(text, resolve));
        }

        async function showWideQuizSuccessFlow() {
            // Lock everything for the whole sequence.
            gameState.canInteract = false;
            gameState.busy = true;
            document.body.classList.add('fx-busy');

          try {
            // Leave the quiz overlay, return to the table scene.
            hideCapacityQuiz();
            hideGuide();                                      // no speech bubble yet
            await wait(320);

            // SCREEN 1 (FIRST): celebration — dim/blur the scene, big centered
            // win Gogo, no speech bubble.
            tutorialCelebrate.classList.add('show');
            tutorialCelebrate.setAttribute('aria-hidden', 'false');
            createSparkles(tutorialCelebrate, 22);
            playSound('success');
            await wait(2200);
            tutorialCelebrate.classList.remove('show');
            tutorialCelebrate.setAttribute('aria-hidden', 'true');
            await wait(300);

            // ----- LEVEL 1 (tall → wide): explain, then advance to level 2. -----
            if (tutorialLevel === TUTORIAL_LEVELS.TALL_TO_WIDE) {
                // Restore the exact reference scene:
                //   dispenser full · tall EMPTY · wide = half-wide.svg
                setDispenserFull();                              // full jar + clear drain mask
                tall.src  = TALL_EMPTY_SRC;                       // ASSETS/TAll container.svg
                wide.src  = WIDE_HALF_SRC + '?t=' + Date.now();   // ASSETS/half-wide.svg
                document.body.classList.remove('scene-playing');  // make sure containers show
                if (tallDrainMask) tallDrainMask.classList.remove('active');

                // Gogo sits below the bubble and leans right toward the wide
                // container (positive tilt = lean toward the cup on the right).
                setGeniePose('54%', '22%', 4);
                showStageGuide();

                // Explanation screens (same placement, only the line changes).
                await typeDialogueAwait('We poured all the<br>juice here.');
                await wait(LINE_HOLD_MS);
                await typeDialogueAwait('But it is still not full!');
                await wait(LINE_HOLD_MS);
                await typeDialogueAwait('So, this container<br>can hold more juice.');
                await wait(LINE_HOLD_MS);
                hideGuide();
                resetGeniePose();
                await wait(300);

                // Continue to the NEXT variation (data-driven). GAME_COMPLETE
                // is NOT set until every variation has been proven + quizzed.
                await advanceTutorialVariation(TUTORIAL_LEVELS.TALL_TO_WIDE);
                return;
            }

            // ----- LEVEL 2 (wide → tall): explain AFTER the correct answer. -----
            if (tutorialLevel === TUTORIAL_LEVELS.WIDE_TO_TALL) {
                // Proof state is still on the table (tall full · wide empty ·
                // spill). Show the overflow explanation now — after the quiz —
                // without replaying any art, then advance.
                await showWideToTallOverflowExplanation();
                await wait(300);
                await advanceTutorialVariation(TUTORIAL_LEVELS.WIDE_TO_TALL);
                return;
            }

            // ----- Any later variation finished: advance or complete. -----
            await advanceTutorialVariation(tutorialLevel);
          } catch (err) {
            // Never leave the game stuck in a busy/locked state on error.
            console.error('[juiceGame] success-flow error:', err);
            document.body.classList.remove('fx-busy');
            gameState.busy = false;
            resetGeniePose();
          }
        }

        /* =========================================================

            },

        let currentLevelId = 'watermelon';
        function getCurrentLevel() { return LEVELS[currentLevelId]; }
        function getLevelConfig(levelId) { return LEVELS[levelId] || null; }

        // ---- Container config (shared engine state; assets set per level) ----
        // The "large" container is the correct, holds-more one — the one the
        // child selects, fills, and pours from. capacity/fillTarget drive the
        // generic overflow proof and are level-independent.
        const MG_LARGE = {
            id: 'large', asset: LEVELS.watermelon.largeContainerAsset,
            capacity: 100, fillTarget: 90, isCorrect: true,
            wrap: mgLargeWrap, liquid: mgLargeLiquid
        };
        const MG_SMALL = {
            id: 'small', asset: LEVELS.watermelon.smallContainerAsset,
            capacity: 55, fillTarget: 100, isCorrect: false,
            wrap: mgSmallWrap, liquid: mgSmallLiquid
        };

        // Per-level pour-stream thickness multiplier (set by applyLevelTheme).
        let mgStreamScale = 1;

        // ---- Theme derivation helpers ----
        // Accept either a ready CSS string or a [dark, mid, light] color array.
        function levelLiquidGrad(level) {
            const g = level.liquidGradient;
            if (Array.isArray(g)) {
                return `linear-gradient(to top, ${g[0]} 0%, ${g[1] || g[0]} 45%, ${g[2] || g[1] || g[0]} 100%)`;
            }
            return g;
        }
        function levelColors(level) {
            // Best-effort [dark, mid, light] for deriving sub-gradients.
            if (Array.isArray(level.liquidGradient)) {
                const g = level.liquidGradient;
                return { dark: g[0], mid: g[1] || g[0], light: g[2] || g[1] || g[0] };
            }
            const e = level.edgeColor || '#e23226';
            return { dark: e, mid: e, light: e };
        }
        function isGradientStr(v) { return typeof v === 'string' && v.indexOf('gradient(') !== -1; }

        // Apply a level's art + colors to the shared overlay. Swaps the
        // dispenser, both stage containers, both quiz cards, sets the CSS theme
        // vars on #mg-stage, and tints the global sparkle/ring FX via vars.
        // Levels may supply rich gradient strings (watermelon/kiwi) OR a minimal
        // color schema (pineapple: array + hexes) — both are normalized here.
        function applyLevelTheme(level) {
            mgDispenser.src = level.dispenserFull;
            mgLargeWrap.querySelector('img').src = level.largeContainerAsset;
            mgSmallWrap.querySelector('img').src = level.smallContainerAsset;
            mgCardLarge.querySelector('img').src = level.largeContainerAsset;
            mgCardSmall.querySelector('img').src = level.smallContainerAsset;
            MG_LARGE.asset = level.largeContainerAsset;
            MG_SMALL.asset = level.smallContainerAsset;

            const c = levelColors(level);
            const edge   = level.edgeColor || c.mid;
            const liquid = levelLiquidGrad(level);
            const stream = level.streamGradient ||
                `linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, ${c.mid} 38%, ${c.dark} 72%, ${c.dark} 100%)`;
            const bubble = level.bubbleGradient ||
                `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0%, ${c.mid} 55%, transparent 100%)`;
            const spill  = isGradientStr(level.spillColor) ? level.spillColor :
                `radial-gradient(ellipse at 50% 40%, ${level.spillColor || edge} 0%, ${level.spillColor || edge} 45%, transparent 72%)`;
            const drop   = level.dropGradient ||
                `linear-gradient(to bottom, ${c.light}, ${c.dark})`;
            const sparkleC = level.sparkleColor || c.light;
            const sparkle  = `radial-gradient(circle, #fffbe6 0%, ${sparkleC} 40%, transparent 70%)`;

            const s = mgStage.style;
            s.setProperty('--mg-liquid-grad', liquid);
            s.setProperty('--mg-stream-grad', stream);
            s.setProperty('--mg-bubble-grad', bubble);
            s.setProperty('--mg-spill-grad',  spill);
            s.setProperty('--mg-drop-grad',   drop);
            s.setProperty('--mg-edge-color',  edge);

            // Pin each container box to its empty-art aspect ratio so fill/full
            // SVG swaps never change size or position (BUG #3).
            if (level.largeAspect) s.setProperty('--mg-large-ar', String(level.largeAspect));
            if (level.smallAspect) s.setProperty('--mg-small-ar', String(level.smallAspect));

            // Global FX tint (sparkles + magic rings are appended to #game-stage).
            document.body.style.setProperty('--fx-sparkle-grad', sparkle);
            document.body.style.setProperty('--fx-ring-color', sparkleC);

            mgStreamScale = level.streamScale || 1;

            document.body.classList.remove('juice-watermelon', 'juice-kiwi', 'juice-pineapple');
            document.body.classList.add('juice-' + level.id);
        }

        // Clear the per-level FX tint (back to default warm yellow) — used when
        // returning to the tutorial via Play Again.
        function clearLevelTheme() {
            document.body.style.removeProperty('--fx-sparkle-grad');
