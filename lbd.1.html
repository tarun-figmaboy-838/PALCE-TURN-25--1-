        // Begin (or restart) a level: set its theme, then run the engine.
        function startLevel(levelId) {
            if (!LEVELS[levelId]) {
                console.warn('[juiceGame] startLevel: unknown level "' + levelId + '"');
                return;
            }
            currentLevelId = levelId;
            console.log('[juiceGame] startLevel → ' + levelId);
            applyLevelTheme(LEVELS[levelId]);
            goToState(GAME_STATES.MAIN_GAME_START);
        }

        // Warm every level's art cache up front so transitions are instant.
        Object.values(LEVELS).forEach(L => {
            [L.dispenserFull, L.dispenserFlow, L.largeContainerAsset, L.smallContainerAsset]
                .forEach(src => { const p = new Image(); p.src = src; });
        });
        [WIN_GOGO_SRC, LOSE_GOGO_SRC].forEach(src => { const p = new Image(); p.src = src; });

        // ---- Transient FX refs ----
        let mgStream    = null;     // active pour/fill stream element
        let mgBubbleTimer = null;
        let mgSpillEl   = null;
        let mgPourArmed = false;    // true only while waiting for the pour tap
        let mgQuizActive = false;   // true only while a quiz accepts taps
        let mgQuizConfig = null;

        // ---------- Geometry (mirrors tutorial helpers, mg dispenser) ----------
        function mgTapPoint() {
            const r = mgDispenser.getBoundingClientRect();
            return { x: r.left + r.width * 0.60, y: r.top + r.height * 0.82 };
        }

        // ---------- Guide / speech ----------
        function mgShowGuide(html) {
            mgSpeech.innerHTML = html;
            mgGuide.classList.add('show');
        }
        function mgHideGuide() { mgGuide.classList.remove('show'); }

        // ---------- Dispenser drain (swap to animated flow SVG) ----------
        function mgDispenserDrainStart() {
            mgDispenser.src = getCurrentLevel().dispenserFlow + '?t=' + Date.now();
        }
        function mgDispenserDrainStop() {
            // Settle back to the static jar (stops the looping flow motion).
            mgDispenser.src = getCurrentLevel().dispenserFull;
        }

        // ---------- Idle "tap here" hand hint (reuses global #hand-hint) ----------
        let mgIdleTimer = null, mgIdleTarget = null;
        const MG_IDLE_EVENTS = ['mousemove', 'touchstart', 'click', 'keydown'];
        function mgArmIdle() {
            clearTimeout(mgIdleTimer);
            mgIdleTimer = setTimeout(() => {
                if (!mgIdleTarget) return;
                const sr = stage.getBoundingClientRect();
                const r  = mgIdleTarget.getBoundingClientRect();
                handHint.style.left = (r.left - sr.left + r.width * 0.5) + 'px';
                handHint.style.top  = (r.top  - sr.top  + r.height * 0.98) + 'px';
                handHint.classList.add('show');
            }, 4000);
        }
        function mgResetIdle() {
            if (!mgIdleTarget) return;
            handHint.classList.remove('show');
            mgArmIdle();
        }
        function mgSetTapTarget(el) {
            mgClearTapTarget();
            mgIdleTarget = el;
            el.classList.add('tap-target-active');
            MG_IDLE_EVENTS.forEach(ev => document.addEventListener(ev, mgResetIdle, { passive: true }));
            mgArmIdle();
        }
        function mgClearTapTarget() {
            if (mgIdleTarget) mgIdleTarget.classList.remove('tap-target-active');
            mgIdleTarget = null;
            clearTimeout(mgIdleTimer);
            handHint.classList.remove('show');
            MG_IDLE_EVENTS.forEach(ev => document.removeEventListener(ev, mgResetIdle));
        }

        // ---------- Movement (under tap / back home) ----------
        function mgMoveToTap(wrap) {
            return new Promise(resolve => {
                const wr  = wrap.getBoundingClientRect();
                const tap = mgTapPoint();
                const mouthX = wr.left + wr.width * 0.50;
                const mouthY = wr.top  + wr.height * 0.02;
                const dx = tap.x - mouthX;
                const dy = (tap.y + wr.height * 0.50) - mouthY;   // sit below the nozzle

                wrap.style.transition = `transform ${MOVE_MS}ms cubic-bezier(0.34, 1.45, 0.55, 1)`;
                wrap.style.zIndex = '8';
                requestAnimationFrame(() => { wrap.style.transform = `translate(${dx}px, ${dy}px)`; });
                // Sparkles trailing the magical move.
                setTimeout(() => createSparkles(wrap, 8), MOVE_MS * 0.4);
                setTimeout(resolve, MOVE_MS + 20);
            });
        }
        function mgReturnHome(wrap) {
            return new Promise(resolve => {
                wrap.style.transition = `transform ${RETURN_MS}ms cubic-bezier(0.4, 0, 0.2, 1)`;
                requestAnimationFrame(() => { wrap.style.transform = ''; });
                setTimeout(() => {
                    wrap.style.transition = '';
                    wrap.style.zIndex = '';
                    resolve();
                }, RETURN_MS + 20);
            });
        }

        // ---------- Streams ----------
        // Vertical stream from the nozzle into a container under the tap.
        function mgFillStream(wrap) {
            playSound('pour');
            const tap = mgTapPoint();
            const wr  = wrap.getBoundingClientRect();
            const from = toStage(tap.x, tap.y);
            const to   = toStage(wr.left + wr.width * 0.50, wr.top + wr.height * 0.45);
            const w = Math.max(9, Math.round(stage.clientWidth * 0.006 * mgStreamScale));
            const h = Math.max(60, to.y - from.y);

            const s = document.createElement('div');
            s.className = 'mg-stream';
            s.style.left = (from.x - w / 2) + 'px';
            s.style.top  = from.y + 'px';
            s.style.width = w + 'px';
            s.style.height = '0px';
            s.style.transition = 'height 480ms ease-in-out';
            stage.appendChild(s);
            mgStream = s;
            requestAnimationFrame(() => { s.style.height = h + 'px'; });
        }
        // Tilted stream from a lifted container's mouth into the receiving jar.
        function mgPourStream(fromWrap, toWrap) {
            playSound('pour');
            const fr = fromWrap.getBoundingClientRect();
            const tr = toWrap.getBoundingClientRect();
            const fromV = { x: fr.left + fr.width * 0.74, y: fr.top + fr.height * 0.30 };
            const toV   = { x: tr.left + tr.width * 0.50, y: tr.top + tr.height * 0.20 };
            const from = toStage(fromV.x, fromV.y);
            const to   = toStage(toV.x, toV.y);
            const dx = to.x - from.x, dy = to.y - from.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle  = Math.atan2(dy, dx) * 180 / Math.PI;
            const w = Math.max(7, Math.round(stage.clientWidth * 0.0045 * mgStreamScale));

            const s = document.createElement('div');
            s.className = 'mg-stream';
            s.style.left = from.x + 'px';
            s.style.top  = from.y + 'px';
            s.style.width = w + 'px';
            s.style.height = '0px';
            s.style.transformOrigin = 'top center';
            s.style.transform = `rotate(${angle - 90}deg)`;
            s.style.transition = 'height 360ms ease-in-out';
            stage.appendChild(s);
            mgStream = s;
            requestAnimationFrame(() => { s.style.height = length + 'px'; });
        }
        function mgStopStream() {
            if (!mgStream) return;
            const s = mgStream;
            s.style.transition = 'height 180ms ease-out, opacity 220ms ease-out';
            s.style.opacity = '0';
            s.style.height = '0px';
            setTimeout(() => s.remove(), 240);
            mgStream = null;
        }

        // ---------- Bubbles inside a filling container ----------
        function mgBubbles(wrap, durationMs) {
            const t0 = performance.now();
            clearInterval(mgBubbleTimer);
            function spawn() {
                const wr = wrap.getBoundingClientRect();
                const ix = wr.left + wr.width * 0.22;
                const iw = wr.width * 0.56;
                const iy = wr.top  + wr.height * 0.12;
                const ih = wr.height * 0.78;
                if (ih < 8) return;
                const progress = Math.min(1, (performance.now() - t0) / durationMs);
                const surfaceY = iy + ih * (1 - progress * 0.85);
                const size = 4 + Math.random() * 6;
                const xV = ix + 2 + Math.random() * Math.max(1, iw - 4);
                const yV = surfaceY + Math.random() * Math.min(12, ih * 0.16);
                const p  = toStage(xV, yV);

                const b = document.createElement('div');
                b.className = 'mg-bubble';
                b.style.left = (p.x - size / 2) + 'px';
                b.style.top  = (p.y - size / 2) + 'px';
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.opacity = '0.95';
                b.style.transition = 'transform 1000ms ease-out, opacity 1000ms ease-in';
                stage.appendChild(b);
                const rise = -(ih * (0.28 + Math.random() * 0.20));
                const drift = (Math.random() - 0.5) * 8;
                requestAnimationFrame(() => {
                    b.style.transform = `translate(${drift}px, ${rise}px) scale(${0.6 + Math.random() * 0.4})`;
                    b.style.opacity = '0';
                });
                setTimeout(() => b.remove(), 1100);
            }
            mgBubbleTimer = setInterval(() => {
                if (performance.now() - t0 > durationMs) {
                    clearInterval(mgBubbleTimer); mgBubbleTimer = null; return;
                }
                spawn();
                if (Math.random() < 0.3) spawn();
            }, 180);
        }

        // ---------- Overflow spill (puddle + drops + splash) ----------
        function mgShowSpill() {
            if (!mgSpillEl) {
                mgSpillEl = document.createElement('div');
                mgSpillEl.className = 'mg-spill';
                mgStage.appendChild(mgSpillEl);
            }
            const sr = mgStage.getBoundingClientRect();
            const r  = mgSmallWrap.getBoundingClientRect();
            const w  = r.width * 2.8;
            const h  = r.height * 0.18;
            mgSpillEl.style.width  = w + 'px';
            mgSpillEl.style.height = h + 'px';
            mgSpillEl.style.left   = (r.left - sr.left + r.width / 2 - w / 2) + 'px';
            mgSpillEl.style.top    = (r.bottom - sr.top - h * 0.4) + 'px';
            void mgSpillEl.offsetWidth;
            mgSpillEl.classList.add('show');

            // A quick splash ring at the jar mouth.
            const splash = document.createElement('div');
            splash.className = 'mg-splash';
            const sz = r.width * 0.7;
            splash.style.width  = sz + 'px';
            splash.style.height = sz + 'px';
            splash.style.left = (r.left - sr.left + r.width / 2 - sz / 2) + 'px';
            splash.style.top  = (r.top  - sr.top  - sz * 0.2) + 'px';
            mgStage.appendChild(splash);
            setTimeout(() => splash.remove(), 540);
        }
        function mgOverflowDrops() {
            const sr = mgStage.getBoundingClientRect();
            const r  = mgSmallWrap.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const d = document.createElement('div');
                d.className = 'mg-drop';
                const sz = 4 + Math.random() * 5;
                const side = Math.random() < 0.5 ? 0.08 : 0.92;   // spill over both rims
                const x = r.left - sr.left + r.width * (side + (Math.random() - 0.5) * 0.1);
                const y = r.top  - sr.top  + r.height * 0.18;
                d.style.width = sz + 'px';
                d.style.height = (sz * 1.4) + 'px';
                d.style.left = x + 'px';
                d.style.top  = y + 'px';
                d.style.opacity = '0.95';
                d.style.transition = 'transform 700ms cubic-bezier(.4,.1,.7,1), opacity 700ms ease-in';
                mgStage.appendChild(d);
                const fall = r.height * (0.7 + Math.random() * 0.3);
                const drift = (side < 0.5 ? -1 : 1) * (4 + Math.random() * 10);
                requestAnimationFrame(() => {
                    d.style.transform = `translate(${drift}px, ${fall}px) scale(0.7)`;
                    d.style.opacity = '0';
                });
                setTimeout(() => d.remove(), 720);
            }
        }
        function mgHideSpill() { if (mgSpillEl) mgSpillEl.classList.remove('show'); }

        // ---------- Quiz (reuses jar-selection.svg panel) ----------
        let mgQuizIdleTimer = null, mgQuizIdleArmed = false;
        function mgArmQuizIdle() {
            clearTimeout(mgQuizIdleTimer);
            mgQuizIdleArmed = true;
            mgQuizIdleTimer = setTimeout(() => {
                if (!mgQuizIdleArmed || !mgQuizConfig) return;
                // Gently pulse the correct card as a hint.
                const hintCard = mgQuizConfig.correctId === 'large' ? mgCardLarge : mgCardSmall;
                hintCard.classList.remove('floating');
                hintCard.classList.add('is-idle-pulse');
            }, 4000);
        }
        function mgStopQuizIdle() {
            mgQuizIdleArmed = false;
            clearTimeout(mgQuizIdleTimer);
            [mgCardLarge, mgCardSmall].forEach(c => c.classList.remove('is-idle-pulse'));
        }

        function mgShowQuiz(config) {
            mgQuizConfig = config;
            mgQuizActive = false;
            mgQuizTitle.innerHTML = config.title;
            [mgCardLarge, mgCardSmall].forEach(c =>
                c.classList.remove('show', 'floating', 'correct', 'wrong', 'is-idle-pulse'));
            mgQuizPanel.classList.remove('show');

            mgQuiz.classList.add('show');
            mgQuiz.setAttribute('aria-hidden', 'false');
            void mgQuizPanel.offsetHeight;          // restart panel pop
            mgQuizPanel.classList.add('show');

            setTimeout(() => {
                mgCardLarge.classList.add('show');
                mgCardSmall.classList.add('show');
            }, 180);
            setTimeout(() => {
                mgCardLarge.classList.add('floating');
                mgCardSmall.classList.add('floating');
                mgQuizActive = true;
                mgArmQuizIdle();
            }, 900);
        }
        function mgHideQuiz() {
            mgStopQuizIdle();
            mgQuizActive = false;
            mgQuiz.classList.remove('show');
            mgQuiz.setAttribute('aria-hidden', 'true');
            [mgCardLarge, mgCardSmall].forEach(c =>
                c.classList.remove('show', 'floating', 'correct', 'wrong', 'is-idle-pulse'));
            mgQuizPanel.classList.remove('show');
        }

        function mgOnCardTap(card) {
            if (!mgQuizActive || gameState.busy) return;
            const cfg = mgQuizConfig;
            const id  = card.dataset.id;
            mgStopQuizIdle();

            if (id === cfg.correctId) {
                // CORRECT: pop only this card, sparkle + ring, then continue.
                mgQuizActive = false;
                card.classList.remove('floating', 'is-idle-pulse');
                card.classList.add('correct');
                createSparkles(card, 24);
                addMagicRing(card);
                playSound('success');

                if (cfg.mode === 'select') {
                    setTimeout(() => {
                        mgHideQuiz();
                        setTimeout(() => goToState(GAME_STATES.MAIN_MOVE_TO_TAP), 320);
                    }, 950);
                } else {
                    setTimeout(() => goToState(GAME_STATES.MAIN_CORRECT), 700);
                }
                return;
            }

            // WRONG: shake only the tapped card; gentle, encouraging feedback.
            mgQuizActive = false;
            card.classList.remove('floating', 'is-idle-pulse');
            card.classList.add('wrong');
            playSound('wrong');

            if (cfg.mode === 'select') {
                // Keep the quiz open and let the child try again.
                setTimeout(() => {
                    card.classList.remove('wrong');
                    card.classList.add('floating');
                    mgQuizActive = true;
                    mgArmQuizIdle();
                }, 560);
            } else {
                // Final quiz: brief lose-Gogo, then re-open the same quiz.
                currentState = GAME_STATES.MAIN_WRONG;
                (async () => {
                    await wait(520);
                    card.classList.remove('wrong');
                    mgHideQuiz();
                    await wait(250);
                    await mgShowLoseGogo();
                    enterMainFinalQuiz();
                })();
            }
        }

        // ---------- Celebration overlays ----------
        function mgShowLoseGogo() {
            return new Promise(resolve => {
                mgCelebrateImg.src = LOSE_GOGO_SRC;
                mgCelebrateText.innerHTML = 'Oops! Try again.';
                mgCelebrate.classList.add('show');
                mgCelebrate.setAttribute('aria-hidden', 'false');
                playSound('wrong');
                setTimeout(() => {
                    mgCelebrate.classList.remove('show');
                    mgCelebrate.setAttribute('aria-hidden', 'true');
                    mgCelebrateImg.src = WIN_GOGO_SRC;
                    mgCelebrateText.innerHTML = '';
                    setTimeout(resolve, 300);
                }, 1500);
            });
        }

        // ---------- Full scene reset ----------
        function mgResetAll() {
            mgStopStream();
            clearInterval(mgBubbleTimer); mgBubbleTimer = null;
            mgClearTapTarget();
            mgHideQuiz();
            mgHideSpill();
            mgCelebrate.classList.remove('show');
            mgCelebrate.setAttribute('aria-hidden', 'true');
            mgHideGuide();
            mgPourArmed = false;

            mgDispenser.src = getCurrentLevel().dispenserFull;
            [MG_LARGE, MG_SMALL].forEach(c => {
                c.wrap.style.transition = 'none';
                c.wrap.style.transform = '';
                c.wrap.style.zIndex = '';
                c.wrap.style.filter = '';               // clear any kiwi fill glow
                c.liquid.style.transition = 'none';
                c.liquid.style.height = '0%';
                c.liquid.classList.remove('overflow');
                void c.liquid.offsetHeight;             // commit before re-enabling transitions
                c.wrap.style.transition = '';
                c.liquid.style.transition = '';
            });
            // Restore each container's static art for the active level (the kiwi
            // fill swaps the large container's <img> to animated SVGs). Reset
            // opacity too, in case a crossfade swap was interrupted.
            const lv = getCurrentLevel();
            [mgLargeWrap, mgSmallWrap].forEach((w, i) => {
                const img = w.querySelector('img');
                img.style.opacity = '1';
                img.src = i === 0 ? lv.largeContainerAsset : lv.smallContainerAsset;
                w.classList.remove('fill-done');
            });
        }

        // Fill-completion polish (BUG/UX): one-shot glow pulse, floating
        // checkmark, and a subtle device vibration. Fires once per fill.
        function showFillComplete(wrap) {
            wrap.classList.remove('fill-done');
            void wrap.offsetWidth;                 // restart the keyframe
            wrap.classList.add('fill-done');

            const sr = mgStage.getBoundingClientRect();
            const r  = wrap.getBoundingClientRect();
            const c  = document.createElement('div');
            c.className = 'fill-check';
            c.textContent = '✓';
            c.style.left = (r.left - sr.left + r.width * 0.5 - 12) + 'px';
            c.style.top  = (r.top  - sr.top  - r.height * 0.04) + 'px';
            mgStage.appendChild(c);
            setTimeout(() => c.remove(), 740);

            if (navigator.vibrate) { try { navigator.vibrate(30); } catch (e) {} }
        }

        /* =========================================================
           CONTAINER FILL ANIMATION (data-driven)
           Most levels fill the selected container with a CSS liquid
           overlay. Kiwi uses dedicated animated SVGs for a realistic
           fill, with a graceful fallback to the CSS system if the SVG
           fails to load — progression is never blocked.
           ========================================================= */
        // Per-level animated fill SVGs: [fillAnim, staticFull, durationMs, glow].
        // The "full" SVGs are authored/patched to start full (begin="indefinite")
        // so the post-fill swap is seamless. Add a level here to give it an
        // animated fill; levels without an entry use the CSS liquid fill.
        const SVG_FILL = {
            kiwi: {
                fillSrc: 'ASSETS/kiwi_juice_filling_animation_new_glass.svg',
                fullSrc: 'ASSETS/kiwi_juice_filling_animation_tip_full.svg',
                durationMs: 2600,    // matches new_glass.svg CSS fill (2.6s)
                glow: 'drop-shadow(0 0 14px rgba(150,210,70,0.95)) drop-shadow(0 0 26px rgba(120,180,60,0.6))'
            },
            watermelon: {
                fillSrc: 'ASSETS/watermelon_juice_filling_animation_color_matched.svg',
                fullSrc: 'ASSETS/watermelon_juice_filling_animation_new_color_fixed.svg',
                durationMs: 2800,    // matches color_matched.svg SMIL fill (2.8s)
                glow: 'drop-shadow(0 0 14px rgba(255,90,60,0.95)) drop-shadow(0 0 26px rgba(210,30,20,0.6))'
            },
            pineapple: {
                fillSrc: 'ASSETS/pineapple_juice_filling_animation_for_this_full.svg',
                fullSrc: 'ASSETS/pineapple_juice_filling_animation_issue_fixed_full.svg',
                durationMs: 2800,    // matches for_this_full.svg SMIL fill (2.8s)
                glow: 'drop-shadow(0 0 14px rgba(255,216,74,0.98)) drop-shadow(0 0 26px rgba(255,179,0,0.65))'
            }
        };

        // Warm the fill-animation caches.
        Object.values(SVG_FILL).forEach(cfg => {
            [cfg.fillSrc, cfg.fullSrc].forEach(src => { const p = new Image(); p.src = src; });
        });

        // Dispatcher: animated SVG fill if the level has one, else CSS liquid.
        function playContainerFillAnimation(levelId) {
            if (levelId === 'kiwi')       return playKiwiFillAnimation();
            if (levelId === 'watermelon') return playWatermelonFillAnimation();
            if (levelId === 'pineapple')  return playPineappleFillAnimation();
            return playStandardFillAnimation();
        }

        // Standard CSS liquid fill (pineapple / fallback).
        function playStandardFillAnimation() {
            return new Promise(resolve => {
                mgLargeLiquid.style.transition = `height ${FILL_MS}ms cubic-bezier(.22, .61, .36, 1)`;
                requestAnimationFrame(() => { mgLargeLiquid.style.height = MG_LARGE.fillTarget + '%'; });
                setTimeout(resolve, FILL_MS);
            });
        }

        // Generic animated-SVG fill: swap the selected container's <img> to the
        // fill SVG, play it empty→full, then swap to the static-full SVG (the
        // source later used for the pour — never reverted to the static art).
        // Falls back to the CSS liquid fill if a SVG fails to load; always
        // resolves so progression is never blocked.
        function playSvgFillAnimation(cfg, onComplete) {
            return new Promise(resolve => {
                const img = mgLargeWrap.querySelector('img');
                let settled = false;
                const finish = () => { if (settled) return; settled = true; resolve(); };

                img.onerror = () => {
                    console.warn('[juiceGame] fill SVG failed to load → CSS fallback');
                    img.onerror = null;
                    img.src = getCurrentLevel().largeContainerAsset;   // restore static glass
                    mgLargeWrap.style.filter = '';
                    playStandardFillAnimation().then(finish);
                };

                // The SVG renders the juice, so keep the CSS liquid empty.
                mgLargeLiquid.style.transition = 'none';
                mgLargeLiquid.style.height = '0%';

                // Empty → full animated glass (cache-bust restarts its anim).
                img.src = cfg.fillSrc + '?t=' + Date.now();
                mgLargeWrap.style.transition = 'filter 240ms ease';
                mgLargeWrap.style.filter = cfg.glow;

                setTimeout(() => { onComplete(); finish(); }, cfg.durationMs);
            });
        }

        // Swap the selected container to its static-full SVG + sparkle burst.
        // Uses a brief opacity crossfade so the asset change never "pops".
        function swapToFullSvg(fullSrc) {
            const img = mgLargeWrap.querySelector('img');
            img.onerror = null;
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = fullSrc + '?t=' + Date.now();
                requestAnimationFrame(() => { img.style.opacity = '1'; });
            }, 110);
            mgLargeWrap.style.filter = '';
            createSparkles(mgLargeWrap, 18);
        }

        function playKiwiFillAnimation()  { return playSvgFillAnimation(SVG_FILL.kiwi, onKiwiFillComplete); }
        function onKiwiFillComplete()     { swapToFullSvg(SVG_FILL.kiwi.fullSrc); }

        function playWatermelonFillAnimation() { return playSvgFillAnimation(SVG_FILL.watermelon, onWatermelonFillComplete); }
        function onWatermelonFillComplete()    { swapToFullSvg(SVG_FILL.watermelon.fullSrc); }

        function playPineappleFillAnimation()  { return playSvgFillAnimation(SVG_FILL.pineapple, onPineappleFillComplete); }
        function onPineappleFillComplete()     { swapToFullSvg(SVG_FILL.pineapple.fullSrc); }

        // =========================================================
        //  STATE ENTRY FUNCTIONS (one deterministic entry per state)
        // =========================================================

        // 1. Start: show scene, then open the first quiz.
        async function enterMainGameStart() {
            mgResetAll();
            mgStage.classList.add('show');
            mgStage.setAttribute('aria-hidden', 'false');
            gameState.busy = true;
            await wait(700);
            goToState(GAME_STATES.MAIN_SELECT_CONTAINER);
        }

        // 2. First quiz: "Select one container." (correct = the larger one).
        function enterMainSelectContainer() {
            gameState.busy = false;
            mgShowQuiz({
                title: 'Select one container.',
                correctId: getCurrentLevel().correctContainerId,
                mode: 'select'
            });
        }

        // 3. Selected container glides under the dispenser tap.
        async function enterMainMoveToTap() {
            gameState.busy = true;
            createSparkles(mgLargeWrap, 10);
            await mgMoveToTap(mgLargeWrap);
            goToState(GAME_STATES.MAIN_FILL_SELECTED);
        }

        // 4. Fill the selected container from the dispenser.
        async function enterMainFillSelected() {
            gameState.busy = true;
            const level = getCurrentLevel();
            const fillMs = SVG_FILL[level.id] ? SVG_FILL[level.id].durationMs : FILL_MS;

            mgDispenserDrainStart();          // dispenser level reduction
            mgFillStream(mgLargeWrap);        // pour stream
            mgBubbles(mgLargeWrap, fillMs);   // rising bubbles

            // Container fill visual: per-level animated SVG (kiwi) or CSS liquid.
            await playContainerFillAnimation(level.id);

            mgStopStream();
            mgDispenserDrainStop();
            createSparkles(mgLargeWrap, 22);  // success sparkle burst (once)
            addMagicRing(mgLargeWrap);
            showFillComplete(mgLargeWrap);    // glow pulse + checkmark + vibrate
            playSound('success');
            await wait(500);
            goToState(GAME_STATES.MAIN_RETURN_FILLED);
        }

        // 5. Return the filled container; ask the child to pour it.
        async function enterMainReturnFilled() {
            gameState.busy = true;
            await mgReturnHome(mgLargeWrap);
            mgShowGuide('Tap to pour it into<br>the other container.');
            mgSetTapTarget(mgLargeWrap);
            currentState = GAME_STATES.MAIN_TAP_TO_POUR;   // armed, waiting for tap
            mgPourArmed = true;
            gameState.busy = false;
        }

        // 6. Pour the large container into the small jar → overflow.
        async function enterMainPourToSmaller() {
            gameState.busy = true;
            mgPourArmed = false;
            mgClearTapTarget();
            mgHideGuide();

            const lw = mgLargeWrap.getBoundingClientRect();
            const sw = mgSmallWrap.getBoundingClientRect();
            const dx = (sw.left + sw.width * 0.42) - (lw.left + lw.width * 0.5);
            const dy = -(lw.height * 0.22);

            // Lift + tilt the large container toward the jar.
            mgLargeWrap.style.zIndex = '9';
            mgLargeWrap.style.transition = 'transform 700ms cubic-bezier(.34, 1.2, .4, 1)';
            requestAnimationFrame(() => {
                mgLargeWrap.style.transform = `translate(${dx}px, ${dy}px) rotate(42deg)`;
            });
            await wait(640);

            // Stream + transfer the juice.
            mgPourStream(mgLargeWrap, mgSmallWrap);
            mgBubbles(mgSmallWrap, 1400);
            mgLargeLiquid.style.transition = 'height 1400ms ease-in';
            mgSmallLiquid.style.transition = 'height 1400ms ease-out';
            requestAnimationFrame(() => {
                mgLargeLiquid.style.height = '0%';
                mgSmallLiquid.style.height = '100%';
            });
            await wait(950);

            // The jar can't hold it all — overflow.
            mgSmallLiquid.classList.add('overflow');
            mgShowSpill();
            mgOverflowDrops();
            createSparkles(mgSmallWrap, 14);
            playSound('pour');
            await wait(700);
            mgStopStream();

            // Return the (now empty) large container upright.
            mgLargeWrap.style.transition = 'transform 600ms cubic-bezier(.4, 0, .2, 1)';
            requestAnimationFrame(() => { mgLargeWrap.style.transform = ''; });
            await wait(620);
            mgLargeWrap.style.zIndex = '';
            goToState(GAME_STATES.MAIN_OVERFLOW_RESULT);
        }

        // 7. Result beat: large empty, small overflowing, spill visible.
        async function enterMainOverflowResult() {
            gameState.busy = true;
            createSparkles(mgSmallWrap, 8);
            await wait(950);
            goToState(GAME_STATES.MAIN_FINAL_QUIZ);
        }

        // 8. Final quiz: "Tap the container that can hold more juice."
        function enterMainFinalQuiz() {
            gameState.busy = false;
            mgShowQuiz({
                title: 'Tap the container that can hold more juice.',
                correctId: getCurrentLevel().correctContainerId,
                mode: 'final'
            });
        }

        // Correct (final): the card already popped; sparkle and move on.
        async function enterMainCorrect() {
            gameState.busy = true;
            await wait(750);
            mgHideQuiz();
            await wait(220);
            goToState(GAME_STATES.MAIN_COMPLETE);
        }

        // Magical transition between levels: dim/blur the scene, Gogo + green
        // sparkle burst, "New juice unlocked!", then hand off to the next level.
        function playJuiceUnlockTransition(nextLevel) {
            return new Promise(resolve => {
                // Switch the FX tint to the next juice so the burst matches it.
                const sc = nextLevel.sparkleColor || '#ffe066';
                document.body.style.setProperty('--fx-sparkle-grad',
                    `radial-gradient(circle, #fffbe6 0%, ${sc} 40%, transparent 70%)`);
                document.body.style.setProperty('--fx-ring-color', sc);

                mgCelebrateImg.src = WIN_GOGO_SRC;
                mgCelebrateText.innerHTML = nextLevel.unlockText || 'New juice unlocked!';
                mgCelebrate.classList.add('show');
                mgCelebrate.setAttribute('aria-hidden', 'false');

        // Generic, data-agnostic proof: fill the SMALLER container to the
        // brim, pour it into the LARGER one, and show juice left to spare —
        // visually proving the larger container holds more.
        function playProofAnimation(round) {
            return new Promise(async (resolve) => {
                gameState.busy = true;
                disableAllTaps();

                const leftEl  = goChoiceEls.find(el => el.dataset.side === 'left');
                const rightEl = goChoiceEls.find(el => el.dataset.side === 'right');

                // Source = smaller capacity, Target = larger capacity.
                const leftCap  = capacityOf(leftEl.dataset.key);
                const rightCap = capacityOf(rightEl.dataset.key);
                const sourceEl = leftCap <= rightCap ? leftEl  : rightEl;
                const targetEl = leftCap <= rightCap ? rightEl : leftEl;
                const sourceCap = Math.min(leftCap, rightCap);
                const targetCap = Math.max(leftCap, rightCap);

                const sourceLiquid = sourceEl.querySelector('.glass-liquid');
                const targetLiquid = targetEl.querySelector('.glass-liquid');

                // Reset both to empty.
                [sourceLiquid, targetLiquid].forEach(l => { l.style.height = '0%'; });
                await wait(120);

                // 1) Fill the smaller container to the top.
                showGuide('Watch! I fill this one up.', {});
                sourceLiquid.style.height = '94%';
                playSound('pour');
                await wait(1000);

                // 2) Tilt the source toward the target (pour gesture).
                showGuide('Now I pour it over here...', {});
                const dir = sourceEl === leftEl ? 1 : -1;   // tilt toward target
                sourceEl.style.transition = 'transform 700ms cubic-bezier(.4,0,.2,1)';
                sourceEl.style.transform = 'translateX(' + (dir * 3) + 'vw) rotate(' + (dir * 38) + 'deg)';
                playSound('pour');
                await wait(450);

                // 3) Source empties while the target fills only partway —
                //    target volume = sourceCap, so fill % = sourceCap/targetCap.
                const targetFillPct = Math.max(8, Math.round((sourceCap / targetCap) * 88));
                sourceLiquid.style.height = '0%';
                targetLiquid.style.height = targetFillPct + '%';
                createSparkles(targetEl, 8);
                await wait(1000);

                // 4) Return the source upright; celebrate the leftover space.
                sourceEl.style.transform = '';
                await wait(500);
                sourceEl.style.transition = '';
                createSparkles(targetEl, 14);
                playSound('success');
                await wait(300);

                gameState.busy = false;
                resolve();
            });
        }

            const ring = document.createElement('div');
            ring.className = 'magic-ring';

        // Adds clickable cursor, busy-aware hover glow, and a tap squash-pop
        // (+ sparkle burst + magic ring) to any interactive container, without
        // disturbing its existing transform animations or click handlers.
        function makeContainerMagical(el, options) {
            if (!el) return;
            options = options || {};
            const tapCount = options.tapCount || 10;
            // gated = only react when this element is the active tap target
            // (so during "tap the wide" the tall jar does NOT hover/glow).
            const gated = options.gated === true;

            const allowed = () => {
                if (gameState.busy) return false;
                // Gated containers only react when they are the active target.
                if (gated && el !== activeTapTarget) return false;
                return true;
            };

            el.classList.add('is-clickable');

            el.addEventListener('mouseenter', () => {
                if (!allowed()) return;
                el.classList.add('is-hovering');
            });
            el.addEventListener('mouseleave', () => {
                el.classList.remove('is-hovering');
            });

            // Quick squash-pop + sparkle burst on press.
            el.addEventListener('pointerdown', () => {
                if (!allowed()) return;
                el.classList.remove('magic-tap');
                void el.offsetWidth;              // restart the keyframe
                el.classList.add('magic-tap');
                if (options.tapSparkle !== false) createSparkles(el, tapCount);
                addMagicRing(el);
            });
            el.addEventListener('animationend', (e) => {
                if (e.animationName === 'magicTap') el.classList.remove('magic-tap');
            });

        // Confirms each container's live img box matches its pinned wrapper box

        function validateContainerSizing() {
            const report = [];
            [['large', mgLargeWrap], ['small', mgSmallWrap]].forEach(([id, wrap]) => {
                const img = wrap.querySelector('img');
                const ib  = img.getBoundingClientRect();
                const wb  = wrap.getBoundingClientRect();
                const dW  = Math.abs(wb.width - ib.width);
                const dH  = Math.abs(wb.height - ib.height);
                const ok  = dW <= 2 && dH <= 2;
                if (!ok) console.warn(`[juiceGame] container "${id}" sizing mismatch >2px`,
                    { wrap: { w: Math.round(wb.width), h: Math.round(wb.height) },
                      img:  { w: Math.round(ib.width),  h: Math.round(ib.height) } });
                report.push({ id, src: img.getAttribute('src'),
                    imgW: Math.round(ib.width), imgH: Math.round(ib.height),
                    boxW: Math.round(wb.width), boxH: Math.round(wb.height), ok });
            });
            console.table(report);
            return report;
