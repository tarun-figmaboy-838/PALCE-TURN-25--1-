<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Genie - Tap to Fill</title>
    <style>
        /* ===== Single tutorial juice theme (locked palette) =====
           One source of truth for orange-juice colour across every screen:
           dispenser stream, tall/wide fills, SVG-fallback overlays, spill
           puddle and drops. Mirrored in JS as TUTORIAL_JUICE_THEME. */
        :root {
            /* Matches the dispenser jar juice (#FEA400 → #CC8400, no pale top)
               so every jar/stream/spill reads as the SAME orange. */
            --tutorial-juice-light: #FEA400;
            --tutorial-juice-mid:   #FEA400;
            --tutorial-juice-dark:  #CC8400;
            --tutorial-stream-color: #FEA400;
            --tutorial-spill-color:  #F28A00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Comic Sans MS', 'Baloo', 'Fredoka', system-ui, sans-serif;
        }

        #game-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            user-select: none;
            -webkit-user-drag: none;
        }

        #table {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: auto;
            z-index: 2;
            user-select: none;
            -webkit-user-drag: none;
        }

        #juice {
            position: absolute;
            left: 18.3%;
            top: 13.8%;
            width: 30%;
            height: auto;
            z-index: 4;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* CSS mask that drains the jar in lockstep with the JS timeline */
        #jar-stop-mask {
            position: absolute;

            /* Covers only the upper part of the orange juice inside the jar */
            left: 26.8%;
            top: 27.2%;
            width: 18.9%;
            height: 0%;

            background: rgba(235, 218, 185, 0.76);
            z-index: 5;
            pointer-events: none;
            opacity: 0;

            border-radius: 10px 10px 0 0;
            transition: height 4200ms linear, opacity 120ms ease;
        }

        #jar-stop-mask.active {
            /* Stop stage matching the desired visual level */
            height: 10.5%;
            opacity: 1;
        }

        /* =========================
           TALL CONTAINER FILL FIX
        ========================= */

        #tall-wrap {
            position: absolute;
            left: 55.2%;
            top: 43.2%;
            width: 5.4%;
            z-index: 5;
            cursor: pointer;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
        }

        #tall {
            position: relative;
            width: 100%;
            display: block;
            z-index: 3;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* REAL ORANGE JUICE INSIDE */
        #tall-liquid {
            position: absolute;
            left: 18%;
            bottom: 5%;
            width: 64%;
            height: 0%;
            /* Matches the Orange Jar.svg juice: #FEA400 (top) -> #CC8400 (bottom) */
            background: linear-gradient(
                to top,
                #cc8400 0%,
                #ee9a00 45%,
                #fea400 100%
            );
            opacity: 0.86;
            z-index: 1;
            border-radius: 0 0 26px 26px;
            transition: height 1.8s cubic-bezier(.22, .61, .36, 1);
            overflow: hidden;
            clip-path: polygon(
                10% 0%,
                90% 0%,
                96% 12%,
                98% 45%,
                94% 100%,
                6% 100%,
                2% 45%,
                4% 12%
            );
            box-shadow:
                inset 0  8px 10px rgba(255,255,255,.28),
                inset 0 -14px 16px rgba(160,70,0,.38);
            pointer-events: none;
        }

        /* glossy top liquid line */
        #tall-liquid::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 10px;

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,255,255,.75),
                    rgba(255,255,255,0)
                );

            border-radius: 50%;
            pointer-events: none;
        }

        /* ACTIVE FILL */
        #tall-liquid.full {
            height: 94%;
        }

        /* bubbling effect */
        #tall-liquid.full::after {
            content: '';
            position: absolute;
            inset: 0;

            background:
                radial-gradient(circle at 30% 80%, rgba(255,255,255,.45) 0 3px, transparent 4px),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,.35) 0 2px, transparent 3px),
                radial-gradient(circle at 50% 30%, rgba(255,255,255,.3)  0 4px, transparent 5px);

            animation: juiceBubble 2s linear infinite;
            pointer-events: none;
        }

        @keyframes juiceBubble {
            0%   { transform: translateY(12px);  opacity: .3; }
            100% { transform: translateY(-18px); opacity: .9; }
        }

        /* Smooth drain overlay for the tall container while pouring out */
        #tall-drain-mask {
            position: absolute;
            left: 16%;
            top: 3%;
            width: 68%;
            height: 0%;
            background: rgba(255, 238, 190, 0.78);
            z-index: 4;
            pointer-events: none;
            border-radius: 26px 26px 8px 8px;
            opacity: 0;
            transition: height 3000ms linear, opacity 160ms ease;
            clip-path: polygon(
                12% 0%,
                88% 0%,
                96% 14%,
                98% 45%,
                92% 100%,
                8% 100%,
                2% 45%,
                4% 14%
            );
        }

        #tall-drain-mask.active {
            height: 68%;
            opacity: 1;
        }

        #wide-wrap {
            position: absolute;
            left: 66.3%;
            top: 51.4%;
            width: 8.7%;
            z-index: 5;
            cursor: pointer;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
        }

        #wide {
            position: relative;
            width: 100%;
            height: auto;
            z-index: 3;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Wide-container fill is now driven by the animated SVG src swap;
           keep the div for compatibility but hide it. */
        #wide-liquid {
            display: none;
        }

        /* Combined pour scene overlay — hidden until wide jar is tapped */
        #pour-scene {
            position: absolute;
            left: 53.5%;
            top: 28%;
            width: 30%;
            height: auto;
            z-index: 13;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
            user-select: none;
            -webkit-user-drag: none;
        }
        #pour-scene.show {
            opacity: 1;
        }

        /* While the pour SVG plays (right side of the screen), hide ONLY the
           two static containers to avoid overlap. The table, background and
           dispenser jar stay visible. Containers fade back in afterwards. */
        body.scene-playing #tall-wrap,
        body.scene-playing #wide-wrap {
            opacity: 0;
            transition: opacity 220ms ease;
            pointer-events: none;
        }

        /* =========================================================
           POUR OVERLAY — plays the animated ASSETS/juice-pour.svg
           (lift + tilt + stream + splash) for the tutorial proof,
           replacing the old static SVG (#pour-scene). Reused element.
           ========================================================= */
        /* Pour SVG: a direct stage child. JS sets left/top/width/height to the
           COMBINED bounding box of #tall-wrap + #wide-wrap, with object-fit:fill
           so the artwork stretches to that exact area (never shrunk). The real
           containers keep their own sizes — they are NOT resized. */
        #html-pour-img {
            position: absolute;
            display: none;
            object-fit: fill;
            transform: none;
            z-index: 11;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Genie positioning driven by CSS variables so it can be adjusted
           responsively (media queries) or per-screen via JS. Default values
           match the previous placement. */
        #genie {
            position: absolute;
            left: var(--genie-left, 43.8%);
            top:  var(--genie-top, 8.5%);
            width: var(--genie-width, 24.8%);
            height: auto;
            z-index: 6;
            user-select: none;
            -webkit-user-drag: none;
            transition: left 600ms cubic-bezier(.34,1.2,.4,1),
                        top 600ms cubic-bezier(.34,1.2,.4,1),
                        width 600ms cubic-bezier(.34,1.2,.4,1),
                        transform 520ms ease;
        }

        /* Responsive overrides: adjust `#genie` for common screen sizes. */
        @media (max-width: 600px) {
            #genie {
                --genie-left: 50%; /* center for narrow screens */
                --genie-top: 6%;
                --genie-width: 36%;
            }
        }
        @media (min-width: 601px) and (max-width: 1100px) {
            #genie {
                --genie-left: 46%;
                --genie-top: 7.2%;
                --genie-width: 30%;
            }
        }
        @media (min-width: 1101px) {
            #genie {
                --genie-left: 43.8%;
                --genie-top: 8.5%;
                --genie-width: 24.8%;
            }
        }

        #dialogue {
            position: absolute;
            left: 65.4%;
            top: 3.2%;
            width: 28%;
            height: auto;
            z-index: 8;                 /* bubble ABOVE Gogo (z6) */
            user-select: none;
            -webkit-user-drag: none;
        }

        #dialogue-text {
            position: absolute;
            left: 67.6%;
            top: 7.1%;
            width: 20.5%;
            font-size: 2.05vw;
            font-weight: 900;
            line-height: 1.15;
            text-align: center;
            color: #5a2d0c;
            z-index: 9;                 /* text ABOVE bubble */
            pointer-events: none;
        }

        /* Guide fade transitions — neutral, unhurried pace (not snappy). */
        #genie,
        #dialogue,
        #dialogue-text {
            transition: opacity 520ms ease;
        }

        /* Gogo glides to his explanation pose and leans (points) toward the
           container being discussed. transform-origin at the lower body so the
           tilt reads as a friendly lean, not a topple. */
        #genie {
            transition: opacity 520ms ease,
                        left 650ms cubic-bezier(.34, 1.2, .4, 1),
                        top  650ms cubic-bezier(.34, 1.2, .4, 1),
                        transform 520ms ease;
            transform-origin: 50% 85%;
        }
        /* Gentle continuous "pointing" bob during explanations. The lean angle
           is supplied per-pose via the --genie-tilt custom property. */
        #genie.is-pointing {
            animation: geniePoint 1.8s ease-in-out infinite;
        }
        @keyframes geniePoint {
            0%, 100% { transform: rotate(var(--genie-tilt, 0deg)) translateY(0); }
            50%      { transform: rotate(var(--genie-tilt, 0deg)) translateY(-1.1%); }
        }

        .guide-hidden {
            opacity: 0 !important;
        }

        /* =========================================================
           GAMIFIED DIALOGUE TEXT
           Each typed letter springs in with a playful bounce, and the
           whole line gives a soft pop when a new line begins. Tuned to a
           neutral, readable pace for early readers — lively, never frantic.
           ========================================================= */
        #dialogue-text .char-pop {
            display: inline-block;
            transform-origin: center bottom;
            animation: charPop 360ms cubic-bezier(.34, 1.56, .4, 1) both;
        }
        @keyframes charPop {
            0%   { transform: translateY(0.32em) scale(0.55) rotate(-6deg); opacity: 0; }
            55%  { transform: translateY(-0.07em) scale(1.14) rotate(2deg);  opacity: 1; }
            100% { transform: translateY(0)       scale(1)    rotate(0deg);  opacity: 1; }
        }

        /* Soft container pop each time a fresh line starts. */
        .dialogue-pop { animation: dialoguePop 420ms cubic-bezier(.22, 1.2, .36, 1); }
        @keyframes dialoguePop {
            0%   { transform: scale(0.94); }
            55%  { transform: scale(1.035); }
            100% { transform: scale(1); }
        }

        /* ---- FX layer ---- */
        body.fx-busy #tall-wrap,
        body.fx-busy #wide-wrap { pointer-events: none !important; }
        body.fx-busy #tall-wrap:hover,
        body.fx-busy #wide-wrap:hover { transform: none; }

        .fx-pour-stream {
            position: absolute;
            pointer-events: none;
            background: linear-gradient(to bottom,
                var(--tutorial-juice-light) 0%,
                var(--tutorial-stream-color) 45%,
                var(--tutorial-juice-dark) 100%);
            border-radius: 999px;
            box-shadow:
                0 0 8px rgba(255,140,0,0.42),
                inset 0 0 4px rgba(255,255,255,0.45);
            transform-origin: top center;
            animation: fx-stream-wobble 420ms ease-in-out infinite alternate;
            /* BEHIND the filling jar (jar wrap is z-index 8 while under the tap)
               so the stream pours in behind the bottle, not over its front. */
            z-index: 4;
        }
        @keyframes fx-stream-wobble {
            0%   { transform: scaleX(1)    translateX(0); }
            100% { transform: scaleX(1.18) translateX(0.6px); }
        }

        .fx-bubble {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                rgba(255,255,255,0.95) 0%,
                rgba(255,225,180,0.55) 55%,
                rgba(255,160,40,0) 100%);
            box-shadow: 0 0 4px rgba(255,255,255,0.4);
            z-index: 10;
            will-change: transform, opacity;
        }

        .fx-sparkle {
            position: absolute;
            pointer-events: none;
            /* Tint is data-driven per level via --fx-sparkle-grad (set by
               applyLevelTheme); falls back to the default warm yellow. */
            background: var(--fx-sparkle-grad, radial-gradient(circle,
                #fffbe6 0%,
                #ffe066 40%,
                rgba(255,200,60,0) 70%));
            border-radius: 50%;
            /* Above the main-game overlay (z 60) and Figma stage (z 80). */
            z-index: 100;
            will-change: transform, opacity;
        }

        /* =========================================================
           CAPACITY QUIZ — overlay + panel + jar choices
           ========================================================= */
        .quiz-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(40, 20, 0, 0.42);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
        }
        .quiz-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .quiz-panel {
            position: relative;
            width: 60vw;
            max-width: 1080px;
            aspect-ratio: 1080 / 606;
            transform: scale(.7);
            opacity: 0;
            transform-origin: center center;
        }
        .quiz-panel.show {
            animation: panelPop 500ms cubic-bezier(.22, 1.45, .36, 1) forwards;
        }
        .quiz-panel-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .quiz-title {
            position: absolute;
            left: 0;
            right: 0;
            top: 4%;
            text-align: center;
            font-size: 2vw;
            font-weight: 850;
            color: #5a2d0c;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.55);
            z-index: 2;
            pointer-events: none;
        }

        /* Two brown slots inside the panel SVG sit at:
              left slot:  x=210/1080=19.4%, y=184/606=30.4%, 28.3%×50.5%
              right slot: x=564/1080=52.2%, y=184/606=30.4%, 28.3%×50.5%
        */
        .quiz-choice {
            position: absolute;
            width: 28.3%;
            height: 50.5%;
            top: 30.4%;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(.4);
            opacity: 0;
            z-index: 5;
            overflow: visible;
            transition: transform 180ms ease;
            font-family: inherit;
        }
        .quiz-choice img {
            display: block;
            width: auto;
            height: auto;
            object-fit: contain;
            opacity: 1;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            z-index: 6;
        }
        #quiz-choice-tall { left: 19.4%; }
        #quiz-choice-wide { left: 52.2%; }
        #quiz-choice-tall img {
            width: 34%;
            max-height: 78%;
        }
        #quiz-choice-wide img {
            width: 58%;
            max-height: 72%;
        }

        .quiz-choice.show {
            opacity: 1;
            animation: jarPop 550ms cubic-bezier(.22, 1.45, .36, 1) forwards;
        }

        .quiz-choice.floating {
            opacity: 1;
            animation: floatJar 2.2s ease-in-out infinite;
        }

        .quiz-choice:hover,
        .quiz-choice:active {
            transform: scale(1.08);
        }

        .quiz-choice.correct {
            animation: winnerPop 500ms ease;
        }
        .quiz-choice.wrong {
            animation: wrongShake 480ms ease-in-out;
        }

        @keyframes panelPop {
            0%   { transform: scale(.7);   opacity: 0; }
            65%  { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1);    opacity: 1; }
        }

        @keyframes jarPop {
            0%   { transform: scale(.4)  rotate(-4deg); opacity: 0; }
            60%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
            80%  { transform: scale(.96);  }
            100% { transform: scale(1);    opacity: 1; }
        }

        @keyframes floatJar {
            0%, 100% { transform: translateY(0);    opacity: 1; }
            50%      { transform: translateY(-8px); opacity: 1; }
        }

        @keyframes winnerPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-10px) rotate(-2deg); }
            40%      { transform: translateX(10px)  rotate(2deg); }
            60%      { transform: translateX(-8px)  rotate(-1.5deg); }
            80%      { transform: translateX(8px)   rotate(1.5deg); }
        }

        /* =========================================================
           MAIN GAME FLOW — overlay shown AFTER the tutorial.
           Self-contained layer (own background + guide + glasses)
           so the tutorial stage underneath stays visually untouched.
           Watermelon-red liquid nods to the Figma "Game Play - Water
           Melon" board; dedicated watermelon SVGs are not in ASSETS,
           so glasses are CSS-drawn and the jar art is reused (see
           TODO notes in the JS asset map).
           ========================================================= */
        #game-overlay {
            position: absolute;
            inset: 0;
            z-index: 60;
            display: none;
            overflow: hidden;
        }
        #game-overlay.show { display: block; }

        #game-overlay .go-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            user-select: none;
            -webkit-user-drag: none;
        }
        #game-overlay .go-table {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: auto;
            z-index: 2;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ---- Round progress + stars (top-left) ---- */
        #go-progress {
            position: absolute;
            top: 4%;
            left: 3%;
            display: flex;
            align-items: center;
            gap: 1.2vw;
            z-index: 8;
        }
        #go-round-label {
            font-size: 2.2vw;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(#ffb13b, #ff8500);
            padding: 0.5vw 1.6vw;
            border-radius: 999px;
            box-shadow: 0 5px 0 #c85a16;
            letter-spacing: 0.5px;
        }
        #go-stars { display: flex; gap: 0.5vw; }
        .go-star {
            font-size: 3vw;
            line-height: 1;
            color: rgba(255, 255, 255, 0.45);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.25);
            transition: transform 250ms ease, color 250ms ease;
        }
        .go-star.earned {
            color: #ffd54a;
            text-shadow: 0 0 14px rgba(255, 200, 60, 0.9);
            animation: starPop 600ms cubic-bezier(.22, 1.45, .36, 1);
        }
        @keyframes starPop {
            0%   { transform: scale(0.3) rotate(-25deg); }
            60%  { transform: scale(1.35) rotate(8deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* ---- Game guide (Gogo + speech bar, top-center) ---- */
        #go-guide {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1vw;
            z-index: 9;
            max-width: 86%;
            opacity: 1;
            transition: opacity 300ms ease;
        }
        #go-guide.hidden { opacity: 0; pointer-events: none; }
        #go-gogo {
            width: 9vw;
            height: auto;
            user-select: none;
            -webkit-user-drag: none;
            flex: 0 0 auto;
        }
        #go-speech {
            position: relative;
            background: #fff;
            border: 0.35vw solid #ffce6b;
            border-radius: 1.6vw;
            padding: 1.1vw 2vw;
            min-width: 22vw;
            max-width: 48vw;
            text-align: center;
            font-size: 1.85vw;
            font-weight: 900;
            line-height: 1.2;
            color: #5a2d0c;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12);
        }

        /* ---- Tap-to-start / continue button ---- */
        #go-start-btn {
            position: absolute;
            left: 50%;
            top: 60%;
            transform: translateX(-50%);
            display: none;
            font-family: inherit;
            font-size: 2.6vw;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(#ffb13b, #ff7a00);
            border: none;
            border-radius: 2vw;
            padding: 1.4vw 4.5vw;
            box-shadow: 0 8px 0 #c85a16;
            cursor: pointer;
            z-index: 10;
            animation: gcFloat 1.6s ease-in-out infinite;
        }
        #go-start-btn.show { display: block; }
        #go-start-btn:active {
            transform: translateX(-50%) translateY(5px);
            box-shadow: 0 3px 0 #c85a16;
        }

        /* ---- Two large container choices ---- */
        #go-choices {
            position: absolute;
            left: 0;
            right: 0;
            top: 30%;
            height: 56%;
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 16vw;
            z-index: 5;
        }
        #go-choices.show { display: flex; }

        .gc-choice {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            transform-origin: center bottom;
            font-family: inherit;
        }
        .gc-choice.idle { animation: gcFloat 2.2s ease-in-out infinite; }
        .gc-choice.wrong { animation: wrongShake 480ms ease-in-out; }
        .gc-choice.correct { animation: winnerPop 650ms ease; }

        @keyframes gcFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-1.4vh); }
        }

        /* CSS-drawn glass — size driven by --gw / --gh per round */
        .glass {
            position: relative;
            width: var(--gw, 8vw);
            height: var(--gh, 18vw);
            border: 0.5vw solid rgba(255, 255, 255, 0.9);
            border-top: 0.25vw solid rgba(255, 255, 255, 0.55);
            border-radius: 0.8vw 0.8vw 2vw 2vw;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0.30) 0%,
                rgba(255, 255, 255, 0.06) 45%,
                rgba(255, 255, 255, 0.30) 100%
            );
            box-shadow:
                inset 0 0 1vw rgba(255, 255, 255, 0.45),
                0 6px 10px rgba(0, 0, 0, 0.18);
            overflow: hidden;
        }
        .glass-liquid {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 0%;
            /* watermelon-red juice for the main game */
            background: linear-gradient(
                to top,
                #e23a1f 0%,
                #ff5a2a 45%,
                #ff8a4d 100%
            );
            box-shadow: inset 0 6px 8px rgba(255, 255, 255, 0.3);
            transition: height 900ms cubic-bezier(.4, 0, .2, 1);
        }
        .glass-liquid::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 0.6vw;
            background: linear-gradient(to bottom, rgba(255,255,255,.7), rgba(255,255,255,0));
            border-radius: 50%;
        }
        .gc-choice .label {
            margin-top: 1.2vh;
            font-size: 1.5vw;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.45);
        }

        /* ---- Game completion celebration ---- */
        #go-complete {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2vh;
            background: rgba(40, 20, 0, 0.42);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
        }
        #go-complete.show { display: flex; animation: panelPop 500ms ease; }
        #go-complete-gogo { width: 22vw; height: auto; }
        #go-complete-stars { display: flex; gap: 1.5vw; }
        #go-complete-stars .go-star { font-size: 6vw; }
        #go-complete-text {
            font-size: 2.6vw;
            font-weight: 900;
            color: #fff;
            text-align: center;
            max-width: 70%;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }

        /* Tutorial celebration overlay — dim + blur the table scene (which
           stays visible behind), with a large centered win Gogo, no bubble. */
        #tutorial-celebrate {
            position: absolute;
            inset: 0;
            z-index: 55;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(40, 20, 0, 0.40);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #tutorial-celebrate.show { display: flex; animation: panelPop 500ms ease; }
        #tutorial-celebrate img {
            width: 34%;
            height: auto;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* =========================================================
           KID-FRIENDLY INTERACTION POLISH
           Clickable cursor + magical hover glow + tap squash-pop +
           idle pulse. Hover/lift are driven by JS classes (busy-aware)
           so they never fight the existing transform animations.
           ========================================================= */
        #tall-wrap, #wide-wrap,
        .quiz-choice, .fs-tap-target, .fs-quiz-choice, .gc-choice,
        .is-clickable {
            cursor: pointer;
        }

        /* Hover: soft magical glow (safe on every element). */
        .is-hovering {
            filter:
                drop-shadow(0 0 12px rgba(255, 220, 90, 0.95))
                drop-shadow(0 0 24px rgba(255, 150, 40, 0.55));
        }
        /* Gentle lift only for simple wrappers that have no competing
           keyframe of their own (avoids fighting float/pop animations). */
        #tall-wrap.is-hovering,
        #wide-wrap.is-hovering,
        .gc-choice.is-hovering {
            transform: translateY(-8px) scale(1.06);
            transition: transform 160ms ease, filter 160ms ease;
        }

        /* Tap feedback: quick squash then pop. */
        @keyframes magicTap {
            0%   { transform: scale(1); }
            45%  { transform: scale(0.92); }
            100% { transform: scale(1.08); }
        }
        .magic-tap { animation: magicTap 260ms ease-out; }

        /* Idle pulse (quiz hint after 4s). */
        @keyframes idlePulse {
            0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 0 rgba(255, 210, 90, 0)); }
            50%      { transform: scale(1.12); filter: drop-shadow(0 0 18px rgba(255, 210, 90, 0.95)); }
        }
        .is-idle-pulse { animation: idlePulse 1.05s ease-in-out infinite; }

        /* No hover/tap polish while the game is busy animating. */
        body.fx-busy .is-hovering { filter: none; transform: none; }

        /* Active tap target — glow + pulse on the exact container the child
           should tap right now (set via setActiveTapTarget / cleared via
           clearActiveTapTargets). */
        .tap-target-active {
            cursor: pointer;
            animation: magicalPulse 1.3s ease-in-out infinite;
            filter:
                drop-shadow(0 0 12px rgba(255, 220, 90, 0.95))
                drop-shadow(0 0 24px rgba(255, 150, 40, 0.55));
        }
        .tap-target-active:hover {
            transform: translateY(-8px) scale(1.06);
        }
        @keyframes magicalPulse {
            0%, 100% { filter: drop-shadow(0 0 6px  rgba(255, 220, 90, 0.5)); }
            50%      { filter: drop-shadow(0 0 22px rgba(255, 220, 90, 1)); }
        }

        /* Animated "tap here" hand hint — appears over the active container
           after 4s of inactivity in the tutorial. Position is set in JS. */
        #hand-hint {
            position: absolute;
            width: 9vw;
            height: auto;
            z-index: 9;
            display: none;
            pointer-events: none;
            transform-origin: center top;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.4));
        }
        #hand-hint.show { display: block; animation: handTap 0.95s ease-in-out infinite; }
        @keyframes handTap {
            0%, 100% { transform: translate(-50%, 0)     rotate(6deg) scale(1); }
            50%      { transform: translate(-50%, -16px) rotate(6deg) scale(1.14); }
        }

        /* Tap burst: a "magic ring" that expands out of the tapped container. */
        @keyframes magicRing {
            0%   { transform: scale(.2);  opacity: .9; }
            100% { transform: scale(2.4); opacity: 0; }
        }
        .magic-ring {
            position: absolute;
            border: 4px solid var(--fx-ring-color, rgba(255, 230, 90, .9));
            border-radius: 50%;
            pointer-events: none;
            z-index: 120;
            animation: magicRing 650ms ease-out forwards;
        }

        /* Overflow spill puddle for the wide -> tall (level 2) flow. The tall
           container can't hold all the juice, so it overflows onto the table. */
        #tall-spill {
            position: absolute;
            z-index: 6;
            opacity: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%,
                var(--tutorial-spill-color) 0%,
                color-mix(in srgb, var(--tutorial-spill-color) 70%, transparent) 45%,
                transparent 72%);
            border-radius: 50%;
            transition: opacity 320ms ease, transform 320ms ease;
            transform: scaleX(0.6);
        }
        #tall-spill.show { opacity: 0.85; transform: scaleX(1); }

        /* =========================================================
           FIGMA SCREEN PLAYER ("The Fish Rescue" storyboard).
           A self-contained 16:9 stage that renders all 38 Figma
           screens as data-driven states. Geometry mirrors the main
           stage so it stays visually consistent, and it reuses the
           same ASSETS. Layered above the tutorial stage; the tutorial
           remains fully intact underneath.
           ========================================================= */
        #figma-stage {
            position: absolute;
            inset: 0;
            z-index: 80;
            display: none;
            overflow: hidden;
            background: #000;
        }
        #figma-stage.show { display: block; }

        #figma-stage .fs-bg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            user-select: none; -webkit-user-drag: none;
        }
        #figma-stage .fs-table {
            position: absolute; left: 0; bottom: 0;
            width: 100%; height: auto; z-index: 2;
            user-select: none; -webkit-user-drag: none;
        }

        /* Dispenser (orange jar) — same geometry as the main stage. */
        #fs-dispenser {
            position: absolute;
            left: 18.3%; top: 13.8%; width: 30%; height: auto;
            z-index: 4; user-select: none; -webkit-user-drag: none;
        }

        /* Container wrappers (img + CSS liquid overlay for flexible fills). */
        #fs-tall-wrap {
            position: absolute; left: 55.2%; top: 43.2%; width: 5.4%;
            z-index: 5; transform-origin: center bottom;
        }
        #fs-wide-wrap {
            position: absolute; left: 66.3%; top: 51.4%; width: 8.7%;
            z-index: 5; transform-origin: center bottom;
        }
        #figma-stage .fs-container-img {
            position: relative; width: 100%; display: block; z-index: 2;
            pointer-events: none; user-select: none; -webkit-user-drag: none;
        }
        #figma-stage .fs-liquid {
            position: absolute; left: 18%; bottom: 5%; width: 64%; height: 0%;
            background: linear-gradient(to top, #cc8400 0%, #ee9a00 45%, #fea400 100%);
            opacity: 0.9; z-index: 1; border-radius: 0 0 12px 12px;
            transition: height 600ms cubic-bezier(.22,.61,.36,1);
            pointer-events: none;
        }
        #fs-wide-wrap .fs-liquid { left: 14%; width: 72%; border-radius: 0 0 26px 26px; }

        /* Tap targets sit above the container art. */
        .fs-tap-target {
            position: absolute; inset: -8% -12%;
            z-index: 6; cursor: pointer; background: transparent; border: none;
        }
        #figma-stage.busy .fs-tap-target,
        #figma-stage.typing .fs-tap-target { pointer-events: none; }

        /* Soft highlight ring to show the child what to tap. */
        #fs-tall-wrap.hint, #fs-wide-wrap.hint {
            animation: fsHint 1.3s ease-in-out infinite;
        }
        @keyframes fsHint {
            0%, 100% { filter: drop-shadow(0 0 0 rgba(255,210,90,0)); transform: translateY(0); }
            50%      { filter: drop-shadow(0 0 16px rgba(255,210,90,0.95)); transform: translateY(-1.2%); }
        }
        #fs-tall-wrap.shake, #fs-wide-wrap.shake { animation: wrongShake 480ms ease-in-out; }
        #fs-tall-wrap.pop,   #fs-wide-wrap.pop   { animation: winnerPop 600ms ease; }

        /* Overflow / spill puddle — no Figma asset for this; CSS fallback. */
        #fs-spill {
            position: absolute; left: 60%; top: 70.5%; width: 22%; height: 7%;
            z-index: 3; opacity: 0; pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%,
                rgba(255,138,20,0.92) 0%, rgba(255,120,0,0.8) 45%, rgba(255,120,0,0) 72%);
            border-radius: 50%;
            transition: opacity 300ms ease, transform 300ms ease;
            transform: scaleX(0.6);
        }
        #fs-spill.show { opacity: 1; transform: scaleX(1); }

        /* Character (Gogo / worm-genie) + speech bubble — main-stage geometry. */
        #fs-char {
            position: absolute; left: 43.8%; top: 8.5%; width: 24.8%; height: auto;
            z-index: 6; user-select: none; -webkit-user-drag: none;
            transition: opacity 300ms ease;
        }
        #fs-char.celebrate { animation: fsCheer 900ms ease-in-out; }
        @keyframes fsCheer {
            0%,100% { transform: translateY(0) rotate(0); }
            30%     { transform: translateY(-4%) rotate(-4deg); }
            65%     { transform: translateY(-2%) rotate(4deg); }
        }
        #fs-bubble {
            position: absolute; left: 65.4%; top: 3.2%; width: 22.2%; height: auto;
            z-index: 7; user-select: none; -webkit-user-drag: none;
            transition: opacity 250ms ease;
        }
        #fs-bubble-text {
            position: absolute; left: 67.6%; top: 7.1%; width: 20.5%;
            font-size: 2.05vw; font-weight: 900; line-height: 1.15;
            text-align: center; color: #5a2d0c; z-index: 8; pointer-events: none;
        }
        #fs-char.hidden, #fs-bubble.hidden, #fs-bubble-text.hidden { opacity: 0; }

        /* Pour animation overlay (reuses juice-pour.svg). */
        #fs-pour {
            position: absolute; left: 50%; top: 5%; width: 63%; height: auto;
            transform: translateX(-50%); z-index: 9; opacity: 0;
            transition: opacity 220ms ease; pointer-events: none;
            user-select: none; -webkit-user-drag: none;
        }
        #fs-pour.show { opacity: 1; }

        /* Quiz panel (reuses jar-selection.svg + container choices). */
        #fs-quiz {
            position: absolute; inset: 0; z-index: 12;
            display: none; align-items: center; justify-content: center;
            background: rgba(40,20,0,0.42);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        #fs-quiz.show { display: flex; }
        #fs-quiz-panel {
            position: relative; width: 60vw; max-width: 1080px; aspect-ratio: 1080/606;
        }
        #fs-quiz-panel .fs-quiz-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none; user-select: none; -webkit-user-drag: none;
        }
        #fs-quiz-title {
            position: absolute; left: 0; right: 0; top: 4%; text-align: center;
            font-size: 3vw; font-weight: 850; color: #5a2d0c;
            text-shadow: 0 2px 0 rgba(255,255,255,0.55); z-index: 2; pointer-events: none;
        }
        .fs-quiz-choice {
            position: absolute; width: 28.3%; height: 50.5%; top: 30.4%;
            border: none; background: transparent; cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; transition: transform 180ms ease;
        }
        #fs-quiz-tall { left: 19.4%; }
        #fs-quiz-wide { left: 52.2%; }
        #fs-quiz-tall img { width: 34%; max-height: 78%; }
        #fs-quiz-wide img { width: 58%; max-height: 72%; }
        .fs-quiz-choice img { pointer-events: none; user-select: none; -webkit-user-drag: none; }
        .fs-quiz-choice.floating { animation: floatJar 2.2s ease-in-out infinite; }
        .fs-quiz-choice.correct  { animation: winnerPop 500ms ease; }
        .fs-quiz-choice.wrong    { animation: wrongShake 480ms ease-in-out; }

        /* Round / screen progress chip + completion celebration. */
        #fs-progress {
            position: absolute; top: 3%; right: 3%; z-index: 10;
            font-size: 1.5vw; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.32); padding: 0.4vw 1.2vw; border-radius: 999px;
        }
        #fs-complete {
            position: absolute; inset: 0; z-index: 15; display: none;
            flex-direction: column; align-items: center; justify-content: center; gap: 2vh;
            background: rgba(40,20,0,0.45);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        #fs-complete.show { display: flex; animation: panelPop 500ms ease; }
        #fs-complete img { width: 22vw; height: auto; }
        #fs-complete .fs-complete-text {
            font-size: 2.6vw; font-weight: 900; color: #fff; text-align: center;
            max-width: 72%; text-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }
        #fs-complete .fs-complete-stars { font-size: 6vw; color: #ffd54a;
            text-shadow: 0 0 14px rgba(255,200,60,0.9); letter-spacing: 1vw; }

        /* =========================================================
           MAIN GAME (WATERMELON) — self-contained overlay layered
           above the tutorial stage. The tutorial DOM/JS underneath is
           never touched. Reuses Background/TAble art, the watermelon
           dispenser SVGs, Gogo/win/loose art, and the jar-selection
           quiz panel. Container fills use CSS liquid overlays so levels
           are flexible; pour + overflow are CSS/JS (no canvas).
           ========================================================= */
        #mg-stage {
            position: absolute; inset: 0; z-index: 70;
            display: none; overflow: hidden; background: #000;
        }
        #mg-stage.show { display: block; }

        #mg-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            user-select: none; -webkit-user-drag: none;
        }
        #mg-table {
            position: absolute; left: 0; bottom: 0; width: 100%; height: auto;
            z-index: 2; user-select: none; -webkit-user-drag: none;
        }

        /* Watermelon dispenser (left). Swaps to the animated flow SVG while
           a container fills so the juice visibly streams/decreases. */
        #mg-dispenser {
            position: absolute; left: 15%; top: 11%; width: 30%; height: auto;
            z-index: 4; user-select: none; -webkit-user-drag: none;
            transition: opacity 200ms ease;
        }

        /* ---- Container wrappers (img + CSS liquid behind the glass art) ---- */
        .mg-wrap {
            position: absolute; z-index: 5; cursor: pointer;
            transform-origin: center bottom;
            user-select: none; -webkit-user-drag: none;
        }
        .mg-wrap img {
            position: relative; width: 100%; display: block; z-index: 3;
            pointer-events: none; user-select: none; -webkit-user-drag: none;
            /* BUG #3 fix: pin each container to a FIXED box (its empty-art
               aspect ratio, set per level) so swapping in fill/full SVGs of a
               different viewBox can never change the on-screen size, position,
               or pivot. object-fit:contain keeps art proportional inside the
               box; the opacity transition gives a smooth, pop-free swap. */
            object-fit: contain;
            transition: opacity 200ms ease;
        }
        #mg-large img { aspect-ratio: var(--mg-large-ar, 0.97); }
        #mg-small img { aspect-ratio: var(--mg-small-ar, 0.77); }

        /* Fill-completion polish: one-shot glow pulse + floating checkmark. */
        .mg-wrap.fill-done { animation: fillDonePulse 620ms ease-out; }
        @keyframes fillDonePulse {
            0%   { filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
            45%  { filter: drop-shadow(0 0 20px var(--fx-ring-color, rgba(255,230,90,.95))); transform: scale(1.06); }
            100% { filter: none; transform: scale(1); }
        }
        .fill-check {
            position: absolute; z-index: 110; pointer-events: none;
            font-size: 2.4vw; font-weight: 900; color: #ffffff;
            text-shadow: 0 0 10px #36b34a, 0 2px 6px rgba(0,0,0,.35);
            animation: fillCheckPop 720ms cubic-bezier(.22, 1.5, .36, 1) forwards;
        }
        @keyframes fillCheckPop {
            0%   { transform: scale(0) translateY(8px); opacity: 0; }
            50%  { transform: scale(1.2) translateY(0);  opacity: 1; }
            100% { transform: scale(1) translateY(-6px); opacity: 0; }
        }
        /* Per-level theme vars live on #mg-stage (set by applyLevelTheme); the
           fallbacks below are the watermelon defaults so the look is unchanged
           if a level forgets to set one. */
        .mg-liquid {
            position: absolute; bottom: 6%; height: 0%;
            background: var(--mg-liquid-grad,
                linear-gradient(to top, #b81616 0%, #e23226 45%, #ff6a4d 100%));
            opacity: 0.92; z-index: 1; border-radius: 0 0 14px 14px;
            transition: height 900ms cubic-bezier(.22, .61, .36, 1);
            box-shadow: inset 0 6px 8px rgba(255, 255, 255, 0.25);
            pointer-events: none; overflow: visible;
        }
        .mg-liquid::before {
            content: ''; position: absolute; left: 0; top: 0;
            width: 100%; height: 8px;
            background: linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,0));
            border-radius: 50%;
        }
        /* Brim meniscus when the small jar overflows. */
        .mg-liquid.overflow::after {
            content: ''; position: absolute; left: -6%; top: -7px;
            width: 112%; height: 12px;
            background: radial-gradient(ellipse at 50% 50%,
                var(--mg-edge-color, #e23226) 0%,
                var(--mg-edge-color, #ff6a4d) 55%, transparent 100%);
            border-radius: 50%;
        }

        /* Big "wider" container (left) — the correct, holds-more one. */
        #mg-large { left: 49%; top: 49%; width: 10%; }
        #mg-large .mg-liquid { left: 17%; width: 66%; }
        /* Smaller jar (right). */
        #mg-small { left: 66%; top: 55.5%; width: 6.4%; }
        #mg-small .mg-liquid { left: 20%; width: 58%; }

        /* Pour / fill stream — color from the active level theme. */
        .mg-stream {
            position: absolute; pointer-events: none;
            background: var(--mg-stream-grad, linear-gradient(to bottom,
                rgba(255,180,160,0.92) 0%, #ff5a3a 38%, #e8312a 72%, #b81616 100%));
            border-radius: 999px;
            box-shadow: 0 0 8px rgba(0,0,0,0.18), inset 0 0 4px rgba(255,255,255,0.4);
            transform-origin: top center;
            animation: fx-stream-wobble 420ms ease-in-out infinite alternate;
            z-index: 73;
        }

        /* Bubbles inside a filling container — tinted per level. */
        .mg-bubble {
            position: absolute; pointer-events: none; border-radius: 50%;
            background: var(--mg-bubble-grad, radial-gradient(circle at 30% 30%,
                rgba(255,255,255,0.95) 0%, rgba(255,170,150,0.55) 55%, rgba(255,80,50,0) 100%));
            box-shadow: 0 0 4px rgba(255,255,255,0.4); z-index: 72;
            will-change: transform, opacity;
        }

        /* Overflow puddle + falling drops + splash on the table. */
        .mg-spill {
            position: absolute; z-index: 6; opacity: 0; pointer-events: none;
            background: var(--mg-spill-grad, radial-gradient(ellipse at 50% 40%,
                rgba(200,22,16,0.92) 0%, rgba(180,18,14,0.8) 45%, rgba(180,18,14,0) 72%));
            border-radius: 50%;
            transition: opacity 320ms ease, transform 320ms ease;
            transform: scaleX(0.5);
        }
        .mg-spill.show { opacity: 1; transform: scaleX(1); }
        .mg-drop {
            position: absolute; z-index: 73; pointer-events: none;
            border-radius: 50% 50% 55% 55%;
            background: var(--mg-drop-grad, linear-gradient(to bottom, #ff6a4d, #c41818));
            box-shadow: 0 0 4px rgba(0,0,0,0.25);
            will-change: transform, opacity;
        }
        .mg-splash {
            position: absolute; z-index: 73; pointer-events: none;
            border: 3px solid var(--mg-edge-color, rgba(226,50,38,0.85)); border-radius: 50%;
            animation: mgSplash 520ms ease-out forwards;
        }

        /* Kiwi level: tint the GLOBAL sparkle + magic-ring FX green (createSparkles
           / addMagicRing append to #game-stage, so we recolor by a body class). */
        /* Sparkle + magic-ring tints are now fully data-driven via the
           --fx-sparkle-grad / --fx-ring-color vars set per level. */
        @keyframes mgSplash {
            0%   { transform: scale(0.25); opacity: 0.9; }
            100% { transform: scale(1.7);  opacity: 0; }
        }

        /* ---- Gogo guide (top-center) ---- */
        #mg-guide {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 1vw; z-index: 9;
            max-width: 86%; opacity: 0; pointer-events: none;
            transition: opacity 300ms ease;
        }
        #mg-guide.show { opacity: 1; }
        #mg-gogo { width: 9vw; height: auto; flex: 0 0 auto;
            user-select: none; -webkit-user-drag: none; }
        #mg-speech {
            position: relative; background: #fff; border: 0.35vw solid #ffce6b;
            border-radius: 1.6vw; padding: 1.1vw 2vw; min-width: 18vw; max-width: 48vw;
            text-align: center; font-size: 1.85vw; font-weight: 900; line-height: 1.2;
            color: #5a2d0c; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12);
        }

        /* ---- Main-game quiz (reuses jar-selection.svg panel) ---- */
        #mg-quiz {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center;
            background: rgba(40, 20, 0, 0.42);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 75; opacity: 0; pointer-events: none;
            transition: opacity 300ms ease;
        }
        #mg-quiz.show { opacity: 1; pointer-events: auto; }
        #mg-quiz-panel {
            position: relative; width: 60vw; max-width: 1080px;
            aspect-ratio: 1080 / 606; transform: scale(.7); opacity: 0;
            transform-origin: center center;
        }
        #mg-quiz-panel.show {
            animation: panelPop 500ms cubic-bezier(.22, 1.45, .36, 1) forwards;
        }
        #mg-quiz-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none; user-select: none; -webkit-user-drag: none;
        }
        #mg-quiz-title {
            position: absolute; left: 0; right: 0; top: 4%; text-align: center;
            font-size: 2vw; font-weight: 850; color: #5a2d0c;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.55);
            z-index: 2; pointer-events: none;
        }
        .mg-card {
            position: absolute; width: 28.3%; height: 50.5%; top: 30.4%;
            border: none; background: transparent; cursor: pointer; padding: 0;
            display: flex; align-items: flex-end; justify-content: center;
            transform: scale(.4); opacity: 0; z-index: 5; overflow: visible;
            transition: transform 180ms ease; font-family: inherit;
        }
        .mg-card img {
            display: block; width: auto; height: auto; object-fit: contain;
            pointer-events: none; user-select: none; -webkit-user-drag: none;
        }
        #mg-card-large { left: 19.4%; }
        #mg-card-small { left: 52.2%; }
        #mg-card-large img { width: 64%; max-height: 80%; }
        #mg-card-small img { width: 44%; max-height: 70%; }
        .mg-card.show { opacity: 1; animation: jarPop 550ms cubic-bezier(.22, 1.45, .36, 1) forwards; }
        .mg-card.floating { opacity: 1; animation: floatJar 2.2s ease-in-out infinite; }
        .mg-card:hover, .mg-card:active { transform: scale(1.08); }
        .mg-card.correct { animation: winnerPop 500ms ease; }
        .mg-card.wrong { animation: wrongShake 480ms ease-in-out; }

        /* ---- Win / lose celebration (keeps the scene blurred behind) ---- */
        #mg-celebrate {
            position: absolute; inset: 0; z-index: 80; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 2.4vh; background: rgba(40, 20, 0, 0.44);
            backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
        }
        #mg-celebrate.show { display: flex; animation: panelPop 500ms ease; }
        #mg-celebrate img { width: 30%; height: auto;
            user-select: none; -webkit-user-drag: none; }
        #mg-celebrate-text {
            font-size: 2.4vw; font-weight: 900; color: #fff; text-align: center;
            max-width: 72%; text-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }

        /* ---- Final game-completion celebration (after the last level) ---- */
        #mg-final {
            position: absolute; inset: 0; z-index: 90; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 2.2vh; background: rgba(40, 20, 0, 0.5);
            backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
            overflow: hidden;
        }
        #mg-final.show { display: flex; animation: panelPop 600ms ease; }
        #mg-final-gogo {
            width: 30%; max-width: 360px; height: auto;
            user-select: none; -webkit-user-drag: none;
            animation: gcFloat 2.2s ease-in-out infinite;
        }
        #mg-final-text {
            font-size: 2.6vw; font-weight: 900; color: #fff; text-align: center;
            max-width: 76%; line-height: 1.25; text-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }
        #mg-final-stars { font-size: 5vw; letter-spacing: 1vw; line-height: 1;
            color: #ffd54a; text-shadow: 0 0 16px rgba(255,200,60,0.9); }
        #mg-play-again {
            font-family: inherit; font-size: 2.4vw; font-weight: 900; color: #fff;
            background: linear-gradient(#ffb13b, #ff7a00); border: none;
            border-radius: 2vw; padding: 1.2vw 4vw; box-shadow: 0 8px 0 #c85a16;
            cursor: pointer; animation: gcFloat 1.6s ease-in-out infinite; z-index: 2;
        }
        #mg-play-again:active { transform: translateY(5px); box-shadow: 0 3px 0 #c85a16; }

        /* Confetti + star burst particles (z above the final overlay). */
        .confetti-piece {
            position: absolute; top: -6%; width: 0.9vw; height: 1.4vw;
            border-radius: 2px; z-index: 95; pointer-events: none;
            will-change: transform, opacity;
        }
        .star-particle {
            position: absolute; z-index: 95; pointer-events: none;
            font-size: 2.2vw; line-height: 1; color: #ffd54a;
            text-shadow: 0 0 10px rgba(255,210,90,0.9);
            will-change: transform, opacity;
        }

        /* Mobile: scale up celebration text + button so they stay legible. */
        @media (max-width: 820px) {
            #mg-final-text  { font-size: 4.6vw; }
            #mg-play-again  { font-size: 4.4vw; padding: 2.4vw 7vw; border-radius: 3.4vw; }
            #mg-final-stars { font-size: 9vw; }
            #mg-final-gogo  { width: 46%; }
        }
    </style>
</head>
<body>
    <div id="game-stage">
        <img id="bg"       src="ASSETS/Background.png"     alt="">
        <img id="table"    src="ASSETS/TAble.png"          alt="">
        <img id="juice"    src="ASSETS/Orange Jar.svg"     alt="">

            <!-- Tap-to-start / continue button -->
            <button id="go-start-btn" type="button">Let's Play!</button>

            <!-- Two big, kid-friendly container choices -->
            <div id="go-choices">

            <!-- Final celebration -->
            <div id="go-complete">
                <!-- TODO(asset): dedicated celebration art; reusing win gogo.png -->
                <img id="go-complete-gogo" src="ASSETS/win gogo.png" alt="Gogo celebrating">
                <div id="go-complete-stars">
                    <span class="go-star">&#9733;</span>

                    <span class="go-star">&#9733;</span>
                </div>

        </div>

        <!-- =========================================================
             FIGMA SCREEN PLAYER — renders all 38 "Fish Rescue" screens.

             ========================================================= -->
        <div id="figma-stage" aria-hidden="true">
            <img class="fs-bg"    src="ASSETS/Background.png" alt="">
            <img class="fs-table" src="ASSETS/TAble.png"      alt="">
            <img id="fs-dispenser" src="ASSETS/Orange Jar.svg" alt="">

            <div id="fs-spill"></div>

            <div id="fs-tall-wrap">
                <div class="fs-liquid" id="fs-tall-liquid"></div>
                <img class="fs-container-img" id="fs-tall-img" src="ASSETS/TAll container.svg" alt="">
                <button class="fs-tap-target" type="button" data-target="tall" aria-label="Tall container"></button>

            <div id="fs-wide-wrap">

                <button class="fs-tap-target" type="button" data-target="wide" aria-label="Wide container"></button>
            </div>

            <img id="fs-bubble" src="ASSETS/Dialoage Box.svg" alt="">
            <div id="fs-bubble-text"></div>

                        <img src="ASSETS/TAll container.svg" alt="">
                    </button>
                    <button id="fs-quiz-wide" class="fs-quiz-choice" type="button" data-target="wide" aria-label="Wide container">
                        <img src="ASSETS/Wide Container.svg" alt="">
                    </button>
                </div>
            </div>

            <!-- Progress chip -->
            <div id="fs-progress">1 / 38</div>

            <!-- Final completion celebration -->
            <div id="fs-complete">
                <img src="ASSETS/win gogo.png" alt="Gogo celebrating">
                <div class="fs-complete-stars">&#9733;&#9733;&#9733;</div>
                <div class="fs-complete-text"></div>
            </div>
        </div>

        <!-- =========================================================
             MAIN GAME (watermelon) — shown after the tutorial finishes.
             Reuses ASSETS; CSS liquid overlays drive flexible fills and
             the overflow is a CSS/JS fallback (no dedicated pour SVG that
             matches these two glasses). See the MAIN GAME module in JS.
             ========================================================= -->
        <div id="mg-stage" aria-hidden="true">
            <img id="mg-bg"        src="ASSETS/Background.png"      alt="">
            <img id="mg-table"     src="ASSETS/TAble.png"           alt="">
            <img id="mg-dispenser" src="ASSETS/Watermelon Jar.svg"  alt="">

            <!-- Big "holds more" container (left) -->
            <div id="mg-large" class="mg-wrap">
                <div class="mg-liquid"></div>
                <img src="ASSETS/for watermelone juice-1.svg" alt="">
            </div>
            <!-- Smaller jar (right) -->

            </div>

            <!-- Quiz modal -->
            <div id="mg-quiz" aria-hidden="true">
                <div id="mg-quiz-panel">
                    <img id="mg-quiz-bg" src="ASSETS/jar-selection.svg" alt="">
                    <div id="mg-quiz-title">Select one container.</div>
                    <button id="mg-card-large" class="mg-card" type="button" data-id="large" aria-label="Larger container">
                        <img src="ASSETS/for watermelone juice-1.svg" alt="">
                    </button>
                    <button id="mg-card-small" class="mg-card" type="button" data-id="small" aria-label="Smaller jar">
                        <img src="ASSETS/for watermelone juice-1-1.svg" alt="">

                <img id="mg-final-gogo" src="ASSETS/win gogo.png" alt="Gogo celebrating">
                <div id="mg-final-stars">&#9733;&#9733;&#9733;</div>

                <button id="mg-play-again" type="button">Play Again</button>

    <script>
    (function () {
        'use strict';

        const stage        = document.getElementById('game-stage');
        const juice        = document.getElementById('juice');
        const tallWrap     = document.getElementById('tall-wrap');
        const tall         = document.getElementById('tall');
        const tallLiquid   = document.getElementById('tall-liquid');
        const tallDrainMask = document.getElementById('tall-drain-mask');
        const jarStopMask   = document.getElementById('jar-stop-mask');
        const pourScene     = document.getElementById('pour-scene');
        const htmlPourOverlay = document.getElementById('html-pour-overlay');
        const htmlPourImg     = document.getElementById('html-pour-img');
        const quizOverlay   = document.getElementById('quiz-overlay');
        const quizPanel     = document.getElementById('quiz-panel');
        const leftChoice    = document.getElementById('quiz-choice-tall');
        const rightChoice   = document.getElementById('quiz-choice-wide');
        const wideWrap     = document.getElementById('wide-wrap');
        const wide         = document.getElementById('wide');
        const wideLiquid   = document.getElementById('wide-liquid');
        const genie        = document.getElementById('genie');
        const dialogue     = document.getElementById('dialogue');
        const dialogueText = document.getElementById('dialogue-text');
        const tutorialCelebrate = document.getElementById('tutorial-celebrate');
        const tutorialCelebrateImg = document.getElementById('tutorial-celebrate-img');
        const WIN_GOGO_SRC  = 'ASSETS/win gogo.png';
        const LOSE_GOGO_SRC = 'ASSETS/loose gogo.png';

        // Tutorial state machine
        const STEPS = {
            TAP_FILL_TALL:    'tap_fill_tall',
            FILLING_TALL:     'filling_tall',
            TAP_POUR_TO_WIDE: 'tap_pour_to_wide',
            POURING_TO_WIDE:  'pouring_to_wide',
            EXPLAIN_MORE:     'explain_more',
            QUIZ:             'quiz',
            SUCCESS:          'success',
            // --- Level 2 (wide → tall overflow) ---
            L2_TAP_FILL_WIDE:    'l2_tap_fill_wide',
            L2_FILLING_WIDE:     'l2_filling_wide',
            L2_TAP_POUR_TO_TALL: 'l2_tap_pour_to_tall',
            L2_POURING_TO_TALL:  'l2_pouring_to_tall',
            L2_EXPLAIN:          'l2_explain'
        };
        let currentStep = STEPS.TAP_FILL_TALL;

        // Tutorial progresses through ordered variations so children can't
        // memorize the answer from one shape alone. Level advances only after
        // each variation's success flow finishes (see showWideQuizSuccessFlow).
        const TUTORIAL_LEVELS = {
            TALL_TO_WIDE: 1,   // fill tall → pour into wide → space remains
            WIDE_TO_TALL: 2    // fill wide → pour into tall → overflow
            // TODO(future juice iterations): add new level ids here, e.g.
            //   SHORT_TO_TALL: 3, NARROW_TO_WIDE: 4, TRICKY_EQUAL_LOOK: 5
        };
        let tutorialLevel = TUTORIAL_LEVELS.TALL_TO_WIDE;

        /* =========================================================
           DATA-DRIVEN TUTORIAL VARIATIONS (extensible)
           The tutorial is an ordered list of "prove which holds more"
           variations played on the table scene. They run in array order;
           after the last one the tutorial completes.

           To ADD a future juice iteration you only need to:
             1. add a level id to TUTORIAL_LEVELS above,
             2. write its `start()` entry flow (model it on
                startWideToTallOverflowLevel — reset scene → instruction →
                fill → pour → explanation → showCapacityQuiz),
             3. append an entry to this array.
           No other code changes are required — advanceTutorialVariation()
           walks this list automatically.
           ========================================================= */
        const TUTORIAL_VARIATIONS = [
            {
                id: 'tall_to_wide',
                level: TUTORIAL_LEVELS.TALL_TO_WIDE,
                // Entry variation — started at boot, so no explicit start().
                start: null
            },
            {
                id: 'wide_to_tall_overflow',
                level: TUTORIAL_LEVELS.WIDE_TO_TALL,
                start: () => startWideToTallOverflowLevel()
            }
            // TODO(future juice iteration #3): short cup vs tall glass.
            //   { id: 'short_to_tall', level: TUTORIAL_LEVELS.SHORT_TO_TALL,
            //     start: () => startShortToTallLevel() },
            // TODO(future juice iteration #4): narrow bottle vs wide bowl.
            //   { id: 'narrow_to_wide', level: TUTORIAL_LEVELS.NARROW_TO_WIDE,
            //     start: () => startNarrowToWideLevel() },
            // TODO(future juice iteration #5): two equal-looking, different volume.
            //   { id: 'tricky_equal_look', level: TUTORIAL_LEVELS.TRICKY_EQUAL_LOOK,
            //     start: () => startTrickyEqualLookLevel() },
        ];

        // Advance to the variation AFTER `fromLevel`; finish if none remain.
        // Clears the busy lock so the next variation's taps work, then starts
        // it. This is the single place that decides "what comes next".
        async function advanceTutorialVariation(fromLevel) {
            const idx  = TUTORIAL_VARIATIONS.findIndex(v => v.level === fromLevel);
            const next = idx >= 0 ? TUTORIAL_VARIATIONS[idx + 1] : null;

            document.body.classList.remove('fx-busy');
            gameState.busy = false;

            if (next && typeof next.start === 'function') {
                tutorialLevel = next.level;
                await next.start();
            } else {
                finishTutorial();
            }
        }

        // Final cleanup once every variation has been proven + quizzed.
        function finishTutorial() {
            hideOverflowSpill();
            resetGeniePose();
            cleanupAnimationState();   // clear tutorial timers/particles before handoff
            document.body.classList.remove('fx-busy');
            gameState.busy = false;
            console.log('[juiceGame] all tutorial variations complete → main game');
            // Hand off to the watermelon main game (never appears before this).
            startMainGame();
        }

        const gameState = {
            busy: false,
            canInteract: false
        };

        /* =========================================================
           UNIFIED STATE MACHINE
           Every Figma screen maps to a named state here. The tutorial
           keeps its existing internal flow (STEPS) but mirrors into
           `currentState` at each transition so getState() is accurate
           and goToState() can jump anywhere for debugging.
           ========================================================= */
        const GAME_STATES = {
            // --- Tutorial (orange juice) ---
            TUTORIAL_START:        'TUTORIAL_START',
            TUTORIAL_FILL_TALL:    'TUTORIAL_FILL_TALL',
            TUTORIAL_POUR_TO_WIDE: 'TUTORIAL_POUR_TO_WIDE',
            TUTORIAL_QUIZ:         'TUTORIAL_QUIZ',
            // --- Main game (watermelon) ---
            GAME_START:        'GAME_START',
            ROUND_INTRO:       'ROUND_INTRO',
            ROUND_CHOICE:      'ROUND_CHOICE',
            ROUND_WRONG:       'ROUND_WRONG',
            ROUND_CORRECT:     'ROUND_CORRECT',
            ROUND_PROOF:       'ROUND_PROOF',
            ROUND_EXPLANATION: 'ROUND_EXPLANATION',
            ROUND_REWARD:      'ROUND_REWARD',
            GAME_COMPLETE:     'GAME_COMPLETE',
            // --- Main game (watermelon): single guided fill→pour→quiz flow ---
            MAIN_GAME_START:       'MAIN_GAME_START',
            MAIN_SELECT_CONTAINER: 'MAIN_SELECT_CONTAINER',
            MAIN_MOVE_TO_TAP:      'MAIN_MOVE_TO_TAP',
            MAIN_FILL_SELECTED:    'MAIN_FILL_SELECTED',
            MAIN_RETURN_FILLED:    'MAIN_RETURN_FILLED',
            MAIN_TAP_TO_POUR:      'MAIN_TAP_TO_POUR',
            MAIN_POUR_TO_SMALLER:  'MAIN_POUR_TO_SMALLER',
            MAIN_OVERFLOW_RESULT:  'MAIN_OVERFLOW_RESULT',
            MAIN_FINAL_QUIZ:       'MAIN_FINAL_QUIZ',
            MAIN_CORRECT:          'MAIN_CORRECT',
            MAIN_WRONG:            'MAIN_WRONG',
            MAIN_COMPLETE:         'MAIN_COMPLETE',

            // --- Generic data-driven LEVEL aliases ---
            // Every juice level (watermelon, kiwi, …) runs through ONE engine
            // (the MAIN_* states above). These aliases are the level-agnostic
            // names; their values point at the canonical MAIN_* state strings so
            // goToState(LEVEL_*) routes to the same entry function. Use whichever
            // reads clearer — they are the same states.
            LEVEL_START:            'MAIN_GAME_START',
            LEVEL_SELECT_CONTAINER: 'MAIN_SELECT_CONTAINER',
            LEVEL_FILL_SELECTED:    'MAIN_FILL_SELECTED',
            LEVEL_TAP_TO_POUR:      'MAIN_TAP_TO_POUR',
            LEVEL_POUR_TO_SMALLER:  'MAIN_POUR_TO_SMALLER',
            LEVEL_FINAL_QUIZ:       'MAIN_FINAL_QUIZ',
            LEVEL_COMPLETE:         'MAIN_COMPLETE',

            // Terminal states (per last level). The engine routes to
            // <LEVEL_ID>_COMPLETE when a level has no nextLevelId.
            KIWI_COMPLETE:          'KIWI_COMPLETE',
            PINEAPPLE_COMPLETE:     'PINEAPPLE_COMPLETE'
        };

        let currentState = GAME_STATES.TUTORIAL_START;
        function getState() { return currentState; }

        /* Central, deterministic router. Each state has exactly one
           entry function; every transition is logged. */

        function setGeniePosition(state) {

        // ---------- Placeholder sound system ----------
        function playSound(name) {
            try {
                if (!playSound._ctx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return;
                    playSound._ctx = new AC();
                }
                const ctx = playSound._ctx;
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                if (name === 'pour') {
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(180, ctx.currentTime);
                    o.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.25);
                    g.gain.setValueAtTime(0.04, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
                    o.start(); o.stop(ctx.currentTime + 0.32);
                } else if (name === 'success') {
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(660, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(990, ctx.currentTime + 0.18);
                    g.gain.setValueAtTime(0.07, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.45);
                    o.start(); o.stop(ctx.currentTime + 0.5);
                } else if (name === 'wrong') {
                    // Gentle, encouraging "try again" — soft falling two-note,
                    // never harsh (kid-friendly).
                    o.type = 'sine';
                    o.frequency.setValueAtTime(420, ctx.currentTime);
                    o.frequency.linearRampToValueAtTime(300, ctx.currentTime + 0.22);
                    g.gain.setValueAtTime(0.05, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.34);
                    o.start(); o.stop(ctx.currentTime + 0.36);
                }
            } catch (e) { /* ignore audio errors */ }
        }

        // ---------- Geometry helpers ----------
        function stageRect()    { return stage.getBoundingClientRect(); }
        function juiceRect()    { return juice.getBoundingClientRect(); }
        function tallWrapRect() { return tallWrap.getBoundingClientRect(); }

        function getTapPoint() {
            const jr = juiceRect();

            return {
                // black tap / nozzle position
                x: jr.left + jr.width * 0.62,
                y: jr.top  + jr.height * 0.80
            };
        }

        function toStage(x, y) {
            const sr = stageRect();
            return { x: x - sr.left, y: y - sr.top };
        }

        function wait(ms) {
            return new Promise(r => setTimeout(r, ms));
