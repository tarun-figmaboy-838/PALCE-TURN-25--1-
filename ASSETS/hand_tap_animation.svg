<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 180" width="130" height="180">
  <!-- Crisp vector "tap here" hand (the source PNG was only 32x32 and blurred
       when scaled up). The tap MOTION is driven by CSS on #hand-hint (.show),
       so this art is static + sharp at any size. Emoji-style pointing hand. -->
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBD2AE"/>
      <stop offset="1" stop-color="#F0B488"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="66" cy="173" rx="33" ry="6" fill="#000" opacity="0.15"/>

  <!-- glow ring at the fingertip (where the tap lands) -->
  <circle cx="59" cy="33" r="15" fill="none" stroke="#FFD66B" stroke-width="4" opacity="0.85"/>

  <!-- blue shirt cuff -->
  <path d="M33 150 Q33 131 66 131 Q99 131 99 150 L99 179 L33 179 Z" fill="#3F7BD6"/>
  <path d="M33 150 Q33 131 66 131 Q99 131 99 150" fill="none" stroke="#2C5BA8" stroke-width="3"/>

  <!-- palm / fist -->
  <path d="M40 96 Q38 78 52 74 L52 60 Q52 49 60.5 49 Q69 49 69 60 L69 74
           Q93 76 95 100 L95 134 Q95 151 66 151 Q40 151 40 134 Z"
        fill="url(#skin)" stroke="#D89B6E" stroke-width="3" stroke-linejoin="round"/>

  <!-- folded knuckles -->
  <path d="M70 91 Q87 91 89 104 L89 121 Q89 125 84.5 125 Q80 125 80 121 L80 104 Q80 96 70 96 Z"
        fill="#EBB082" opacity="0.85"/>
  <path d="M70 104 Q85 104 87 117" fill="none" stroke="#D89B6E" stroke-width="2" opacity="0.65"/>

  <!-- thumb -->
  <path d="M40 105 Q25 103 25 115 Q25 128 42 125 Z"
        fill="url(#skin)" stroke="#D89B6E" stroke-width="3" stroke-linejoin="round"/>

  <!-- pointing index finger -->
  <rect x="50.5" y="20" width="19" height="64" rx="9.5" fill="#FCD3AF" stroke="#D89B6E" stroke-width="3"/>
  <ellipse cx="60" cy="29" rx="6" ry="5" fill="#FFEAD6" opacity="0.85"/>
</svg>
